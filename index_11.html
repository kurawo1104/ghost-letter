<script>
var DATA = [{"cat": "work", "avatar": "🏯", "text": "社内の出世争いがかなり激しくて、毎日プレッシャーで胃が痛い日々を送っています。そんな中、先日ついに昇進をかけた大事なプレゼンがあったのですが……緊張しすぎてその場でうんこを漏らしてしまいました。その後なんとか平静を装って最後まで発表しきったのですが、周りには気づかれていなかったと思います（たぶん）。この黒歴史を胸に秘めたまま昇進した人って、ちゃんと活躍できるものですか？むしろこのくらいの恥を経験した方が強くなれる気もしていますが、客観的な意見が聞きたいです。", "who": "🏯 徳川家康", "trivia": "家康は武田信玄との三方ヶ原の戦い（1572年）で大敗し、命からがら逃げ帰った際に馬上で脱糞したという逸話が有名です。その情けない姿を絵師に描かせ「しかみ像」として生涯の戒めにしたと伝わります。後に天下を取る男の最大の黒歴史。恥を力に変えた人物の元祖です。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🐒", "text": "どん底の非正規から、根性と口先だけでなんとか部長まで成り上がりました。自分でも信じられないくらいのサクセスストーリーなのですが、最近ひとつ不安なことがあります。部下の中に、明らかに自分より仕事ができるやつがいて、周りもそれを薄々気づいています。そいつが直接ポジションを狙いにくるわけではないのですが、だんだん存在が怖くなってきました。実力で負けているとわかっている相手とうまく共存するにはどうすればいいですか？それとも、早めに手を打った方がいいですか？", "who": "🐒 豊臣秀吉", "trivia": "足軽から関白まで成り上がった秀吉は晩年、最も恐れていた家臣は徳川家康だったとされます。茶会に招いたり姉を人質に送ったりして懐柔を試みましたが、結局は死後に天下を奪われます。「成り上がり」の元祖が抱えた、最大の人事マネジメント問題です。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🔥", "text": "会社のルールが古すぎて本当にうんざりしています。「昔からこうやってきた」「前例がない」「リスクが高い」――そんな言葉で改革提案を全部潰されます。私が正しいのはわかっているのに、組織が追いついてこない。正直、上を全部入れ替えて自分が仕切りたいです。でも、急激に変えようとすると周りの反発が激しくて、最終的に自分がやられそうな気もして。革命って、やり切るかやられるかしかないんですかね？", "who": "🔥 織田信長", "trivia": "信長は楽市楽座・鉄砲の大量導入・兵農分離など当時の常識を次々と破壊した革命的経営者でした。しかしその急進的な手法は周囲の反発を招き、最終的に部下・明智光秀に本能寺で討たれます（1582年）。改革者は孤独であり、急ぎすぎると自らが「前例」になることがあります。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🎨", "text": "フリーランスのデザイナーをしているのですが、あるクライアントに本当に疲弊しています。「まだですか」「ここが違う」「なんかイメージと違う」と毎日メッセージが来て、修正回数はとっくに100回を超えました。私は4年かけてようやく完成させた自信作を納品したのに、「思っていたのと違う」の一言で突き返されました。天才が本気で作ったものを「違う」と言う人に、どう接すればいいですか？もう限界です。", "who": "🎨 ミケランジェロ", "trivia": "ミケランジェロはシスティーナ礼拝堂の天井画を4年かけて完成させました（1508〜1512年）。その間、ローマ教皇ユリウス2世から毎日「いつ終わるんだ」と催促され「終わるべき時に終わる」と言い返し続けたと伝わります。その天井画は500年後も世界最高傑作と呼ばれています。クライアントワークの原点。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🌀", "text": "仕事の守備範囲が広すぎて自分でも把握できていません。デザイン・プログラミング・料理・音楽・建築の設計図・人体の解剖図……気づいたら手を出していて、全部中途半端です。締め切りを10件以上破っています。依頼者からは「天才なんだから早くやれ」と言われますが、天才だからこそ全部が気になってしまうんです。一つのことに集中する方法を教えてください。もしくは、全部中途半端でも許されますか？", "who": "🌀 レオナルド・ダ・ヴィンチ", "trivia": "ダ・ヴィンチは絵画・彫刻・建築・音楽・数学・工学・解剖学・地質学・植物学と全方位の天才でしたが、完成させた作品は極めて少なく「モナ・リザ」も16年かけてまだ未完成と言い続けました。「マルチタスク失敗」と「未完成の天才」の代名詞として歴史に刻まれています。", "source": "world", "r18": false}, {"cat": "work", "avatar": "✍️", "text": "ギャンブルで作った借金が膨らんで、返済のためにとんでもない契約をしてしまいました。「28日以内に完成原稿を提出しなければ著作権を全て渡す」という内容です。残り26日、まだ1文字も書いていません。仕事の依頼は入っているのにギャンブルが止められなくて、本当に自分が嫌になります。誰か一緒に作業してくれる人を探しているのですが、こんな状況でも手を貸してくれる人はいますか？もし助けてもらえたら、その人と一生一緒にいたいくらいです。", "who": "✍️ フョードル・ドストエフスキー", "trivia": "ドストエフスキーはギャンブル依存症による借金のため「期日までに小説を書かなければ著作権をすべて渡す」という契約を結ばされ、速記者を雇って28日で「賭博者」を書き上げました。その速記者アンナ・スニートキナと後に結婚します。修羅場から傑作と妻を同時に得た、文学史上最大の締め切り克服エピソードです。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🎼", "text": "同期のことが本当に羨ましくて、もう嫉妬を通り越して憎しみに近い感情になってきました。才能の差は認めます。評価も向こうが上なのもわかってる。でも絶対に口に出して認めたくないし、認めたら自分が終わる気がして。毎日そいつの仕事をチェックしてしまって、うまくいくたびに落ち込んで、失敗するたびにちょっとだけほっとしてしまう自分が最低すぎます。この感情、どうすれば楽になりますか？", "who": "🎼 アントニオ・サリエリ", "trivia": "宮廷作曲家サリエリがモーツァルトを毒殺したという伝説はほぼ創作ですが、映画「アマデウス」で嫉妬の権化として描かれ世界的に有名になりました。実際のサリエリはベートーヴェンやシューベルトの師でもある優れた音楽家でした。「サリエリ症候群（才能ある同僚への嫉妬）」という言葉まで生まれた、意図せず歴史の教訓になってしまった人物です。", "source": "world", "r18": false}, {"cat": "work", "avatar": "👑", "text": "ダイエットを決意したのが3回目です。毎回挫折しています。食べることが本当に生きがいで、食事制限を始めると翌日には暴食しています。体重が三桁に突入してしまい、特注の服と特注の椅子が必要になってきました。周りには「健康のため」と言われますが、美食は私の最大の楽しみなので、やめたくないんです。「食べて幸せ」と「健康」、どちらを優先すべきですか？体重を言い訳に6人目の彼女候補にも逃げられました。", "who": "👑 ヘンリー8世", "trivia": "イングランド王ヘンリー8世は若い頃は長身のスポーツマンでしたが、晩年は体重130kg超・ウエスト137cmに達しました。足の壊疽を患い廊下の移動にも特製の車椅子が必要だったと記録されています。6人の妻との結婚・離婚・処刑を繰り返しながら食べ続けた王。痛風とも戦い続けました。", "source": "world", "r18": false}, {"cat": "work", "avatar": "📐", "text": "お風呂でシャンプーをしていたら、突然とんでもないアイデアが頭に降ってきました。頭が泡だらけのまま「これだ！」と叫んで、タオルも持たずに廊下に飛び出してしまいました。近所の人と目が合いましたが、そんなことより早くメモしないといけなかったので、ずぶ濡れのまま走りました。同じような経験をした方はいますか？あと、ひらめきって風呂場に来やすい理由があるんですか？アイデアが降ってくる仕組みが気になって仕方がないです。", "who": "🛁 アルキメデス", "trivia": "紀元前3世紀の数学者アルキメデスは入浴中に浮力の原理を発見した瞬間「ヘウレーカ（わかった！）」と叫びながら裸で街を走ったと伝わります。「ユーレカ」は今や世界共通の「ひらめき」を意味する言葉に。実際、リラックス状態の風呂場はデフォルトモードネットワークが活性化しやすく、ひらめきが起きやすいという神経科学的根拠もあります。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🍎", "text": "公園でぼーっと座っていたら突然すごいアイデアが降ってきて、ノートに書きなぐっていたら周りの人に「急にどうしたの？大丈夫？」と心配されました。私は至って正常で、ただ天才的なひらめきが来ただけなのですが、傍から見るとやばい人っぽいですよね。ひらめいた瞬間って、周りへの配慮が消えてしまうものなのですが、みなさんはひらめきが来たときどういう顔をしていますか？", "who": "🍎 アイザック・ニュートン", "trivia": "ニュートンがリンゴが落ちるのを見て万有引力を思いついたという逸話は本人が晩年に語ったことで広まりました。「頭に当たった」は後世の誇張で「落ちるのを見た」が正しいとされます。1687年の「プリンキピア」出版で物理学の歴史が変わりました。ちなみに本人は社交性が極めて低く、議論の最中に突然無関係のことを考え込む癖があったと伝わります。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🔭", "text": "研究の結論が会社の公式見解と真逆になってしまいました。データは正確だし、証拠も揃っているのに「発表するな」と圧力をかけられています。「会社の方針に逆らうなら居場所はない」とまで言われました。でも間違った情報が広まり続けるのも嫌で。キャリアを守るか、真実を守るか、本当に悩んでいます。こういうとき、正しい選択って存在するんですか？それとも、どちらを選んでも何かを失いますか？", "who": "🔭 ガリレオ・ガリレイ", "trivia": "ガリレオは地動説を支持する観測結果を発表し1633年にローマ宗教裁判にかけられました。「それでも地球は動く」と呟いたという有名な逸話があります（後世の創作の可能性が高い）。裁判で地動説を撤回したものの、晩年は自宅軟禁で研究を続けました。キャリアか真実かを迫られた人物の元祖。", "source": "world", "r18": false}, {"cat": "work", "avatar": "⚡", "text": "上司が私の企画書を自分の名前で役員に提出していたことが発覚しました。証拠のメールも保存してあります。同僚も「あれはあなたの仕事だった」と知っています。ただ、その上司は社内での発言力が強くて、告発すれば自分のポジションも危うくなりそうで……。もし黙っていたら、これからもずっと手柄を取られ続ける気がします。正しいことをするのが怖いこの感覚、どうすれば乗り越えられますか？", "who": "🗡️ マルクス・ブルータス", "trivia": "「ブルータス、お前もか」で有名なシーザー暗殺事件。ブルータスはシーザーの親友でしたが「共和政ローマのため」という大義名分で暗殺に加担しました。告発か沈黙かという葛藤は2000年前から変わらない普遍のテーマです。ブルータス自身もその後の内戦で敗れ、自害しています。正義の実行は常に代償を伴います。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🏔️", "text": "30代にして、やりたかったことをほぼ全部やり切ってしまいました。事業も順調で、売上も目標を超えて、チームも優秀で。でも最近、何もやりたいことが思い浮かばなくて、ぼーっとしてしまう時間が増えています。これ以上どこを目指せばいいのかわからなくて、達成感よりも虚無感の方が大きい。「もっとやりたいことを作れ」と言われますが、作れないんです。これって贅沢な悩みですか？", "who": "🏔️ アレクサンドロス大王", "trivia": "アレクサンドロス大王は32歳でペルシャ・エジプト・インドに至る空前の大帝国を築き「これ以上征服する土地がない」と涙を流したと伝わります。33歳で急死。「目標を全て達成した後の虚無」を「アレクサンドロス症候群」と呼ぶことがあります。人類史上最大の燃え尽き症候群かもしれません。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🐉", "text": "前の職場をちゃんとした手続きなしに辞めてしまいました。引き継ぎも挨拶もなく、ある日突然連絡が取れなくなる形での退職でした。当時は「とにかく出ないといけない」という一心で、今になって後悔しています。転職先では充実していて後悔はないのですが、前の職場の人たちのことが頭に残っています。今更謝りに行くべきか、それとも前だけ向いて生きるべきか。無断退職ってどこまで取り返しがつきますか？", "who": "🌊 坂本龍馬", "trivia": "龍馬は1862年、藩の許可を得ずに脱藩しました。当時の脱藩は死罪に値する重罪でした。しかしその後、薩長同盟の仲介や大政奉還のきっかけを作り近代日本の礎を築きます。史上最大の「無断退職成功例」の一つ。罪を犯した後に時代を変えた男の話です。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "💡", "text": "新しいプロダクト開発で、気づいたら3000回以上失敗していました。上司には「もうやめろ、お前には無理だ」と言われていますが、諦める気が全くありません。失敗するたびに「これはうまくいかない方法を一つ発見した」と考えていたのですが、最近「そんな考え方で自分を守っているだけじゃないか」とも思えてきて。どこかで折れた方がいいのか、それとも折れないことが才能なのか、本当にわかりません。", "who": "💡 トーマス・エジソン", "trivia": "エジソンは電球のフィラメント開発で数千回の実験を繰り返したと言われます。「失敗ではない、うまくいかない方法を1万通り発見した」という言葉が有名です。実際は助手チームとの共同作業で、発明の多くはチームの成果でしたが、諦めない姿勢が歴史を変えた点は本物でした。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🚂", "text": "自分が立ち上げた会社なのに、取締役会の決議によって追放されました。自分の子みたいに育てた会社なのに、出ていかされる理不尽さが今でも信じられません。ただ、そこから別の事業を立ち上げたら想定以上にうまくいって、自信が戻ってきました。今は「あの追放がなければ今の自分はなかった」とすら思えます。一度全部を失うことで見えてくるものって、本当にあるんですね。", "who": "💻 スティーブ・ジョブズ", "trivia": "ジョブズは1985年に自分が創業したアップルから取締役会の決議で追放されました。その後NeXTとピクサーを創業し、1997年にアップルに復帰してiMac・iPod・iPhone・iPadを発表します。「追放されたことが人生最良の出来事だった」と語っています。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🎯", "text": "美術の先生に「あなたには才能がない、この道は向いていない」とはっきり言われました。確かに画力はクラスで一番低いかもしれません。でも自分では、見える世界が他の人と違う気がしていて、やめる気が全くないんです。才能がなくても続けた人って、結果として報われましたか？才能より情熱の方が強いことって本当にありますか？", "who": "🌻 フィンセント・ファン・ゴッホ", "trivia": "ゴッホが本格的に絵を描き始めたのは27歳から。生前に売れた絵はほぼ1枚（「赤いぶどう畑」）だけで、弟テオの仕送りで生活しながら37歳で死去しました。しかし現在「ひまわり」は数百億円の価値があり、世界で最も有名な画家の一人です。評価は生前に来るとは限りません。", "source": "world", "r18": false}, {"cat": "work", "avatar": "📊", "text": "完璧な理論とデータに基づいた提案書を作って、会議で発表したのですが「現場では使えない」「机上の空論」と一蹴されました。私の理論は正しいのに、なぜ動かしてもらえないのかが本当に謎です。理論が正しければ実行されるべきでは？現場の感情論で論理が潰されることって、みなさんはどうやって受け入れていますか？", "who": "📜 ニッコロ・マキャベリ", "trivia": "マキャベリは「君主論」で権力の本質を冷徹に理論化しましたが、政治から追放されて書いたこの著作は生前ほとんど評価されませんでした。「目的は手段を正当化する」という解釈で悪名高くなりましたが、実際は現実政治の観察書です。理論家が現場に弾かれ続けた500年前の苦悩は今も生きています。", "source": "world", "r18": false}, {"cat": "love", "avatar": "💜", "text": "義理の母のことが頭から離れません。亡くなった父の後妻で、自分よりずっと若い方なのですが、最初に会った瞬間から何かが違いました。そんな感情を持ってはいけないとわかっているし、自分でも信じられないくらい苦しいです。毎日顔を合わせる距離にいるのに、何もできないし何も言えない。これは罪ですか？こういう気持ちを持ってしまった人は、どうやって自分を保っていますか？", "who": "🌸 光源氏（源氏物語）", "trivia": "源氏物語の光源氏は、父・桐壺帝の后である藤壺（亡き母に似ている）に恋し、ついに密通してしまいます。生まれた子は帝の子として育てられ後に冷泉帝となります。紫式部が1000年以上前に書いた日本文学最大のスキャンダルで、現代でも世界最高の心理小説と評されます。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "👻", "text": "別れた元カレが新しい彼女を職場に連れてきました。二人が楽しそうに話しているところを、私は笑顔で「よかったね」と言いながら見ていました。帰宅してから、自分でも気づかなかった感情が溢れてきて、眠れない夜が続いています。怒りとも悲しみとも違う、もっとどろどろした何かが体の中にある感じ。この感情に名前をつけてほしいです。そしてどこにぶつければいいか教えてください。", "who": "🔥 六条御息所（源氏物語）", "trivia": "源氏物語の六条御息所は光源氏への執念が生き霊となって新しい恋人・葵の上に憑依し死に至らしめてしまいます。本人すら気づかない嫉妬の念が怪異を起こす——日本文学史上最恐の元カノと言われ、現代でも「生霊」「嫉妬の権化」の代名詞として使われます。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "🧵", "text": "彼氏が海外赴任に行ったまま3年が経ちます。最初は毎日連絡していたのが週1になり、今は月1くらいです。周りはみんな「もう終わってるよ」「新しい人探しなよ」と言いますが、なぜかまだ待てる気がしているんです。自分でもおかしいとは思っています。でも、帰ってくる気がして。論理的に考えたら終わっているのに、この直感ってどこから来るんでしょうか。待ち続けることって、やっぱり愚かですか？", "who": "🧵 ペネロペ（ホメロス「オデュッセイア」）", "trivia": "ペネロペはトロイア戦争後に行方不明になった夫オデュッセウスを20年待ち続けました。「この機織りが終わったら再婚を考える」と言いながら昼に織って夜にほどき続け求婚者を退けます。夫は最終的に帰ってきました。「ペネロペの布」は今も「終わらない作業」の比喩として使われます。", "source": "myth", "r18": false}, {"cat": "love", "avatar": "🌹", "text": "好きな人のマンションの近くまで来て毎晩LINEを送っているのですが、これってやりすぎですか？ブロックはされていないし、たまに既読もついています。直接会いに行くのはさすがにまずいかなと思いつつ、声が聞きたくて。付き合ってもいないのに「おやすみ」と送り続けているのですが、これって迷惑でしょうか。もし迷惑だったとしても、どうしてもやめられないです。", "who": "🌹 ロミオ（シェイクスピア「ロミオとジュリエット」）", "trivia": "ロミオがジュリエットのバルコニーの下から語りかける場面はシェイクスピア最も有名なシーン。ちなみに二人が出会ってから死ぬまでわずか4〜5日という超スピード展開です。現代ならストーカー認定されかねない距離感ですが、文学史上最高のロマンスとされています。", "source": "literature", "r18": false}, {"cat": "love", "avatar": "⚔️", "text": "一番の親友が、自分の彼女と浮気していたことがわかりました。本人に問い詰めたら「好きになってしまった、申し訳ない」と言われました。彼女も「本当のことを言う勇気がなかった」と。二人とも大切な人で、どちらも切れないんです。三人でなんとか前みたいな関係に戻れるものでしょうか。それとも、もうどちらかと完全に縁を切るしかないですか？", "who": "⚔️ ランスロット（アーサー王伝説）", "trivia": "円卓の騎士の筆頭ランスロットは、親友であり主君でもあるアーサー王の妃グィネヴィアと密通します。中世ヨーロッパ最大の修羅場で、この裏切りがキャメロットの崩壊を招きます。「最高の友情」と「最大の裏切り」は紙一重だという物語の元祖です。", "source": "myth", "r18": false}, {"cat": "love", "avatar": "🌺", "text": "義理の息子のことを好きになってしまいました。夫の連れ子で、20代前半の子です。初めて会った時から何か変な感覚はあったのですが、それが恋だとわかったのは最近のことです。自分でも信じられないし、消したいです。毎日同じ家にいるのが本当につらい。夫には絶対に言えないし、誰にも相談できなくて。こういう感情は、時間が経てば消えていくものですか？", "who": "🌿 パイドラー（ギリシャ神話）", "trivia": "パイドラーはテーセウスの妻でありながら継息子ヒッポリュトスに恋し、拒絶されると「逆に迫られた」と夫に虚偽告発しました。その結果ヒッポリュトスは死に、パイドラー自身も自害します。ラシーヌの悲劇「フェードル」（1677年）として有名で、今も世界中で上演されています。", "source": "myth", "r18": false}, {"cat": "love", "avatar": "🏹", "text": "告白のLINEを送ったら「友達として大切にしたい」という返信が来ました。でも、その後もフォローは外れていないし、私のストーリーにはいつも一番最初に既読がついています。「好きな人がいる」とも言っていないし、新しい彼女/彼氏の話もしてこない。これって脈なしと断言していいですか？それとも、もう一歩踏み込んでもいいサインでしょうか。過去に同じ状況から付き合えた方がいたら教えてほしいです。", "who": "🏹 アポロン（ギリシャ神話）", "trivia": "アポロンに一方的に追い回されたダフネは父に懇願して月桂樹に変身して逃げました。アポロンは「せめて冠にする」とその枝を折って月桂冠にしました。これが今日の「月桂冠（栄光の象徴）」の起源。振られた失恋がシンボルになったという皮肉な話です。", "source": "myth", "r18": false}, {"cat": "love", "avatar": "⚓", "text": "友人の恋人のことが、どうしても好きになってしまいました。初めて会った時から気になっていて、何度か会ううちに本気になってしまいました。友情か恋心かで毎晩葛藤しています。友人は私を親友と思ってくれていて、それが余計につらい。告白すれば友情が壊れる、黙っていれば自分が壊れる。この状況、最低な自分だとわかってはいますが、誰かに聞いてほしかったです。", "who": "⚓ トリスタン（トリスタンとイゾルデ）", "trivia": "中世叙事詩「トリスタンとイゾルデ」では、騎士トリスタンが王の花嫁イゾルデを護送する途中に惚れ薬を飲んでしまい禁断の愛に落ちます。ワーグナーのオペラとしても有名。「惚れ薬のせい」という言い訳は通じませんが、人類が数百年共感し続けてきた感情です。", "source": "myth", "r18": false}, {"cat": "love", "avatar": "💔", "text": "パートナーの浮気が発覚しました。相手のLINEを見てしまって、かなりの期間続いていたことがわかりました。当然別れるべきだとわかっているのですが、それでも別れたくない気持ちもあって。愛しているのか執着しているのかもわからなくなっています。この感情の整理の仕方を誰か教えてください。傷ついているのに、その人の顔を見ると怒れないんです。", "who": "⚡ ヘラ（ギリシャ神話）", "trivia": "ゼウスの妻ヘラは夫の無数の浮気に激怒しながらも、最高神の妻という地位を手放せず、怒りの矛先を浮気相手や生まれた子たちに向け続けました。「別れられない妻」の神話的元祖であり、ヘラクレスへの迫害もヘラの嫉妬が原因です。", "source": "myth", "r18": false}, {"cat": "love", "avatar": "🌊", "text": "双子の兄（弟）のことが好きになってしまいました。ずっと前から「この人は特別だ」と感じていたのに、よく考えたら物心ついた時からずっと一緒にいる人でした。家族として育ってきたのに、ある日「あ、これは恋だ」と気づいてしまって、それ以来関係が変な感じになっています。こんな感情、どうすれば消せますか？消せないとしたら、どうすればいいですか？", "who": "🎭 ジークムントとジークリンデ（ワーグナー「ワルキューレ」）", "trivia": "ワーグナーの楽劇「ワルキューレ」ではジークムントとジークリンデが初対面で恋に落ち、双子の兄妹だと判明した後も結ばれます。その子がのちの英雄ジークフリートです。神々の意志と人間の愛情の衝突を描いた作品で、ニーベルング指環（1870年完成）の一部です。", "source": "myth", "r18": false}, {"cat": "love", "avatar": "👸", "text": "なぜか求婚者を全員断ってしまいます。自分でも「この人でいいかも」と思うんですが、直前になると「本当に？」という感覚が来て、次第に無理難題を要求してしまいます。「不可能を達成してきたら考える」と言って、相手が諦めてほっとするんです。本当は結婚したいのに、なぜ自分でブロックしてしまうのかわかりません。これは結婚恐怖ですか？それとも単純に誰も好きじゃないだけですか？", "who": "🌙 かぐや姫（竹取物語）", "trivia": "かぐや姫は5人の貴公子それぞれに「仏の石の鉢」「蓬莱の玉の枝」「火鼠の裘」「龍の首の珠」「燕の子安貝」という不可能な宝を求め、全員撃退しました。日本最古の物語（9〜10世紀頃）の主人公で、「高嶺の花」「無理難題」の代名詞です。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "👘", "text": "昔付き合っていた人が今は別の人と結婚して、子どもも産まれたと聞きました。SNSで幸せそうな写真を見てしまって、複雑な気持ちになっています。相手の幸せを喜ぶべきなのはわかっているのですが、胸が痛くなってしまうのはなぜですか。もう好きじゃないつもりでいたのに、こういう瞬間に感情が戻ってきて、自分でも嫌です。", "who": "🌸 在原業平（伊勢物語）", "trivia": "平安時代の貴公子・在原業平は数々の禁断の恋を繰り広げた「色男」として知られます。伊勢物語では二条の后との禁断の恋が描かれています。「ちはやぶる神代もきかず竜田川 からくれなゐに水くくるとは」は百人一首にも収録された代表歌。情熱と喪失を生きた人物です。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "🏛️", "text": "好きな人に会ったのが、9年前の1回だけです。名前も連絡先も知らないし、もう会うことはないとわかっています。それなのに、毎日その人のことを考えてしまいます。「たった一度の出会い」なのに、なんでこんなに引きずるんでしょうか。こういう感情は、諦めた方がいいですか？それとも、もしかしたらまた会える気がする、という直感を信じていいですか？", "who": "📜 ダンテ・アリギエーリ", "trivia": "ダンテは9歳の時にベアトリーチェに出会い18歳で再会。彼女は他の男性と結婚し25歳で亡くなりますが、ダンテは生涯彼女を愛し続け「神曲」の天国篇で案内役として登場させました。一生に2回しか会っていない可能性がある女性への永遠の愛です。", "source": "literature", "r18": false}, {"cat": "love", "avatar": "🔮", "text": "別れた元カレが新しい彼女と共通の友人のパーティーに来ていました。なんとか平静を装ったのですが、帰宅してから感情が爆発してしまいました。相手がいい人そうだったのが余計にきつかった。自分でもどこまでやるつもりなのかわからない衝動があって怖いです。こういう感情が出てきた時に、自分を守る方法を教えてください。", "who": "🔥 メーデイア（ギリシャ神話）", "trivia": "コルキスの王女メーデイアは夫イアーソーンが新しい王女と婚約すると、毒のドレスを贈って花嫁を殺し、自分の子供まで手にかけます。エウリピデスの悲劇として紀元前431年に上演された「元パートナーへの復讐」の神話的究極形です。", "source": "myth", "r18": false}, {"cat": "love", "avatar": "🌟", "text": "本命じゃない相手と付き合っています。理由は経済的な安定と社会的なポジションです。本当に好きな人は別にいるのですが、その人は私に本気かどうかもわかりません。このまま年を取っていくのかと思うと、なんか全てが中途半端で、誰のことも本気で愛せていない気がします。これって、ただの打算的な生き方ですか？", "who": "👑 クレオパトラ", "trivia": "クレオパトラはカエサル、アントニウスと次々に関係を持ちましたが、それは個人的な恋愛と同時にエジプト存続のための政治的戦略でもありました。両者の死後、オクタウィアヌスに敗れた際には自ら命を絶ちます。「美貌」より「知性と戦略」の人物だったと近年の研究では評価されています。", "source": "world", "r18": false}, {"cat": "love", "avatar": "💒", "text": "10代のうちに結婚させられて、相手の家に一人で送り込まれました。言葉も習慣も違う環境で、「笑っていなさい」とだけ言われて孤独に生きています。本当のことを言えば「贅沢だ」と怒られるし、感情を見せれば「わがままだ」と言われます。こういう環境で、自分を保つにはどうすればいいですか？散財以外の逃げ場を探しています。", "who": "👑 マリー・アントワネット", "trivia": "マリー・アントワネットはオーストリアからフランスに嫁いだのが14歳。言語も文化も異なる宮廷で孤立し、散財による逃避が「パンがなければケーキを食べればいい」という（おそらく誤解された）言葉につながったとされます。フランス革命で38歳でギロチンにかけられました。", "source": "world", "r18": false}, {"cat": "sns", "avatar": "💀", "text": "投稿しようと思うたびに「本当にこれでいいのか」「バズるのか」「炎上しないか」と考えすぎて、結局下書きのまま終わります。下書きフォルダがいつの間にか500件を超えていました。友達には「考えすぎだよ、出せばいい」と言われますが、出せないんです。完璧じゃないものを出すのが怖いというか、出した途端に自分が評価される気がして。この「出せない病」の治し方を教えてください。", "who": "💀 ハムレット（シェイクスピア）", "trivia": "「生きるべきか死ぬべきか（To be or not to be）」の独白で有名なハムレットは、父を殺した叔父への復讐を延々と考えながら実行できないまま物語が進みます。「考えすぎて行動できない」状態を「ハムレット症候群」と呼びます。下書きフォルダのクリエイターの永遠の悩みです。", "source": "literature", "r18": false}, {"cat": "sns", "avatar": "🎪", "text": "配信を2年やっていますが、ずっとマスクと声変換で顔も声も出していません。顔出しすれば伸びるのはわかっているのですが、素顔を見せることへの恐怖が消えません。「仮面をつけたまま大成した人いますか」というより、仮面の中にいることが本当の自分になってきていて、もし外したら自分が消える気がしています。これって病気ですか？", "who": "🎭 ファントム（ガストン・ルルー「オペラ座の怪人」）", "trivia": "1910年発表の「オペラ座の怪人」のエリックは顔に変形を持ちパリのオペラ座の地下に隠れ住みながら歌姫クリスティーヌを愛します。仮面の裏に天才的な音楽の才能を持つ彼は、現代ならVtuberとして大成功していたかもしれません。", "source": "literature", "r18": false}, {"cat": "sns", "avatar": "🐋", "text": "半年前にコラボした配信者に完全にやられました。コラボ中に私の発言を切り取られて炎上させられて、視聴者が半分になりました。「もうやめとけ」と言われてもそいつのことが頭から離れなくて、毎晩そいつの配信をチェックして、いつか格付けを逆転させることだけを考えています。これって健全じゃないのはわかっているのですが、やめられないんです。", "who": "🐋 エイハブ船長（ハーマン・メルヴィル「白鯨」）", "trivia": "1851年発表の「白鯨」のエイハブ船長は白いマッコウクジラ「モービィ・ディック」に足を食いちぎられ、復讐のために船と乗組員全員を巻き込んで追跡し続けます。その執念は最終的に自身の破滅を招きました。コラボのしくじりを引きずりすぎると自分が沈む話。", "source": "literature", "r18": false}, {"cat": "sns", "avatar": "😴", "text": "仕事が忙しくてSNSを半年ほど離れていたのですが、復帰したら別世界になっていました。フォロワーが4分の1になり、顔なじみのアカウントが消えていて、界隈の文化もルールも変わっていて、どこから始めればいいかわかりません。一から出直すしかないのはわかっていますが、この「どこにも属せない感覚」が一番つらいです。SNS離脱後の復帰方法、経験者に教えてほしいです。", "who": "😴 リップ・ヴァン・ウィンクル（ワシントン・アーヴィング）", "trivia": "1819年の短編「リップ・ヴァン・ウィンクル」では、山で眠った男が目覚めると20年経っていた、という物語。英語では\"Rip Van Winkle\"が「時代遅れの人」を意味する慣用句として定着しています。SNS休止後の復帰あるある、現代版の浦島太郎です。", "source": "world", "r18": false}, {"cat": "sns", "avatar": "🌸", "text": "自分の顔が好きすぎて困っています。自撮りを毎日200枚くらい撮って、その中から5枚くらいを投稿しています。鏡を見るのがやめられなくて、外出のたびに窓に映る自分を確認してしまいます。「ナルシスト」と言われますが、自分を愛することの何がいけないのかが本当にわからないです。ただ、最近池のそばを通ると吸い込まれそうな気がするのが少し怖いです。", "who": "🌸 ナルキッソス（ギリシャ神話）", "trivia": "ギリシャ神話のナルキッソスは池に映る自分の姿に恋をして離れられなくなり、やがて水仙（ナルシサス）の花に変わったとされます。「ナルシスト（自己陶酔者）」の語源であり、現代の「自撮り中毒」の神話的元祖です。", "source": "myth", "r18": false}, {"cat": "sns", "avatar": "📖", "text": "毎日コンテンツを投稿し続けないといけない恐怖があります。1日でも休むとフォロワーが離れる気がして、体調が悪くても投稿をやめられません。先日高熱の中でライブ配信をして、倒れそうになりながら「続きは明日！」と言いました。「ストップしていいよ」という言葉を待っているのに、誰も言ってくれません。これって普通ですか？", "who": "📖 シェヘラザード（千夜一夜物語）", "trivia": "シェヘラザードは王に毎晩物語を語り続けることで処刑を免れました。「続きは明日」と引っ張ることで1001夜を生き延びます。毎日コンテンツを出し続けなければ死ぬという強迫観念は、彼女の場合は文字通り本当のことでした。", "source": "myth", "r18": false}, {"cat": "sns", "avatar": "🌍", "text": "旅行動画を上げているのですが、毎回「盛りすぎ」「合成でしょ」「そんな場所あるわけない」とコメントが来ます。本当に自分の目で見た景色なのに、誰にも信じてもらえないのが本当につらいです。「嘘をつく理由がない」と言っても「それが嘘つきの言い方だ」と返ってくる。真実を語って嘘つき扱いされ続けた経験のある方、どうやって気持ちを保ちましたか？", "who": "🌍 マルコ・ポーロ", "trivia": "マルコ・ポーロは13世紀にアジアを旅し「東方見聞録」を著しましたが、あまりに壮大な内容に「嘘つきマルコ」と呼ばれました。臨終の際にも「私が見たことは実際に経験したことの半分にも満たない」と語ったとされます。旅行コンテンツ配信者の元祖が信じてもらえなかった話。", "source": "world", "r18": false}, {"cat": "sns", "avatar": "🌌", "text": "科学的に正しいことを投稿したら大炎上しました。「常識を疑え」という内容だったのですが、既存の権威を支持する人たちからの集中砲火でアカウントが凍結寸前です。正しいことを言って叩かれ続けるのが本当につらい。それでもやめない理由は「これは正しいから」というだけです。こういう経験をした方、どうやって続けましたか？", "who": "🔭 コペルニクス", "trivia": "コペルニクスは地動説（太陽が中心）を発表しましたが、これは当時の宗教的世界観と真っ向から対立するものでした。安全のため死ぬ直前まで公表を控えたとされます。「コペルニクス的転回」という言葉は今も「常識を覆すこと」の比喩として使われます。", "source": "world", "r18": false}, {"cat": "sns", "avatar": "🎨", "text": "毎日必死に投稿しているのに、0いいねの日が続いています。誰かに届いている実感が全くなくて、虚空に向かって叫び続けている気分です。でも、やめられないんです。誰かに見てほしいというより、作らずにはいられない衝動があって。0いいねで続けてきた人に聞きたいのですが、どこかのタイミングで何かが変わりましたか？", "who": "🌻 フィンセント・ファン・ゴッホ", "trivia": "ゴッホは生涯に約900点の絵を描きましたが、生前に売れた絵はほぼ1枚だけだったとされます。弟テオへの手紙が800通以上残っており、孤独と創作への情熱が伝わります。現在「ひまわり」の価値は数百億円。評価は死後に来ることがあります。", "source": "world", "r18": false}, {"cat": "sns", "avatar": "🎭", "text": "誰にも理解されない難解な考察を毎日投稿しています。「読む気がしない」「長い」「意味不明」「時代遅れ」とリプが来ますが、絶対に妥協はしません。わかる人だけわかってくれればいいと思っていますが、最近「わかる人」が一人もいないのではという気がしてきました。未来の誰かに届けばいい、という考え方は逃げですか？", "who": "📚 フリードリヒ・ニーチェ", "trivia": "ニーチェは生前ほとんど評価されず、晩年は精神疾患を患い孤独のうちに死にました。しかし「神は死んだ」「超人思想」「永劫回帰」などの概念は20世紀の思想・文学・映画に多大な影響を与えます。「私を理解するには時代が100年早い」という言葉が残っています。", "source": "world", "r18": false}, {"cat": "sns", "avatar": "🎪", "text": "自分の歌を自分で配信で歌い続けているのですが、「うまくない」「痛い」「やめろ」のコメントが毎回来ます。それでも自分の才能を信じているし、いつか評価されると思っています。ただ、最近会場（配信の視聴者）に出られない人が増えている気がして、それが少し引っかかっています。続けることで傷ついているのは私だけですか？", "who": "🎶 ネロ皇帝", "trivia": "ローマ皇帝ネロは詩や歌、竪琴の演奏に情熱を持ち、自ら公開演奏を行いました。観客は帰ることを許されず、出産のために会場から逃げた女性がいたという逸話もあります。「芸術家」を自称した独裁者の痛い自己表現として歴史に刻まれています。", "source": "world", "r18": false}, {"cat": "life", "avatar": "📝", "text": "30代になって「自分が何者なのかわからない」という感覚が止まりません。仕事も人間関係も、なんとなく流されてきた10年でした。やりたいことも好きなことも、正直よくわかっていません。周りはみんな「自分らしく生きている」ように見えて、自分だけが暗い森の中をさまよっているような気分です。これって遅すぎますか？それとも、気づいた今からでもやり直せますか？", "who": "📜 ダンテ・アリギエーリ（神曲）", "trivia": "「神曲」は「人生の旅の半ば、私は暗い森の中にいた」という一文で始まります。35歳のダンテが迷いの森に迷い込む物語です。地獄・煉獄・天国を旅する大叙事詩ですが、その出発点は「中年の迷子」でした。迷子になることは新しい旅の始まりかもしれません。", "source": "literature", "r18": false}, {"cat": "life", "avatar": "🦁", "text": "親友が突然事故で亡くなりました。一切の予告なく、昨日まで普通にLINEしていた人がいなくなった。もう何もやる気が出なくて、食欲もなくて、毎日ぼーっとしています。「時間が解決する」と言われますが、時間で解決してほしくないんです。忘れたくないから。この感覚、変ですか？", "who": "🦁 ギルガメシュ（ギルガメシュ叙事詩）", "trivia": "世界最古の文学とされるギルガメシュ叙事詩（紀元前2000年頃）では、親友エンキドゥの死に絶望したギルガメシュが不死の草を求めて世界の果てまで旅します。入手直後に蛇に奪われ、結局死を受け入れる物語です。4000年前から人間は友の死に泣いていました。", "source": "myth", "r18": false}, {"cat": "life", "avatar": "♾️", "text": "毎日同じことの繰り返しで、何も変わらない気がします。頑張っても頑張っても同じ場所にいる感覚。上に押し上げようとした瞬間に何かが転がり落ちて、また最初からやり直し。これが何十年も続くと思うと、意味がわからなくなってきました。「それでも続けること」に意味はありますか？", "who": "🪨 シジフォス（ギリシャ神話）", "trivia": "シジフォスは神々への不敬の罰として、巨大な岩を山頂まで押し上げ、頂上に達するたびに岩が転げ落ちる作業を永遠に繰り返す呪いを受けました。カミュは著作「シジフォスの神話」で「シジフォスは幸福だと想像しなければならない」と書き、不条理の中の意味を探しました。", "source": "myth", "r18": false}, {"cat": "life", "avatar": "🔥", "text": "善いことをしようと思って行動したら、逆に自分が大きな罰を受ける羽目になりました。誰かを助けようとしただけなのに、それが禁じられていたことで、今は毎日責め続けられています。助けようとした相手は救われているのに、助けた自分が一番苦しい。善意って、むくわれないものですか？", "who": "🔥 プロメテウス（ギリシャ神話）", "trivia": "プロメテウスは人間のために神々から火を盗んで与えましたが、その罰として岩に縛り付けられ毎日鷲に肝臓を食べられ続けます（肝臓は夜に再生する）。何千年もその刑が続いたとされます。善意が罰を招く理不尽さの神話的象徴。", "source": "myth", "r18": false}, {"cat": "life", "avatar": "🌊", "text": "兄（上司）が職場で大暴れして、部下や取引先に迷惑をかけ続けています。親（社長）は長男に甘くて「まあまあ」で済ませてしまう。私はずっと真面目にやっているのに、兄のせいで部署全体の評判が落ちています。「長男だから仕方ない」という文化が本当に嫌いです。こういう環境でどうやって自分の評価を保てばいいですか？", "who": "🌊 ポセイドン（ギリシャ神話）", "trivia": "ゼウス・ポセイドン・ハデスの三兄弟は父クロノスを倒した後、くじ引きで天界・海・冥界を分担しました。暴れん坊のゼウスが何かと地上に干渉しまくり、ポセイドンもたびたび争います。ギリシャ神話の神々は最初から家族崩壊・職場崩壊状態です。", "source": "myth", "r18": false}, {"cat": "life", "avatar": "☀️", "text": "調子に乗りすぎて、取り返しのつかない失敗をしました。「もっと慎重にしろ」「高く飛びすぎだ」と言われ続けていたのに、全部無視して突っ走った結果です。「だから言ったじゃないか」と言われるたびに、本当にそうだったと思います。失敗してから後悔しても遅いのはわかっているのですが、それでも立ち上がった方法を知りたいです。", "who": "☀️ イカロス（ギリシャ神話）", "trivia": "ダイダロスとイカロスは蝋でつけた翼で島から脱出しました。「太陽に近づきすぎるな」と言われたにもかかわらず飛ぶ喜びに夢中になったイカロスは太陽に近づきすぎて蝋が溶け、海に墜落して死にます。「調子に乗るな」「過信するな」という教訓の元祖です。", "source": "myth", "r18": false}, {"cat": "life", "avatar": "🏺", "text": "今の生活を全部捨てたいです。仕事も家も人間関係も。荷物を1つのバッグに収めて、どこかに消えたいという衝動があります。みんなから「もったいない」と言われますが、「もったいない」という感覚そのものが重くて、それから逃げたい気もしています。全部捨てた経験のある人に聞きたいのですが、捨てた後に後悔しましたか？", "who": "🌿 釈迦（ゴータマ・シッダールタ）", "trivia": "釈迦は裕福な王族の家に生まれましたが、29歳で妻子・地位・財産の全てを捨てて出家しました。35歳で悟りを開き仏教を開きます。史上最大の「全捨て成功例」の一つです。ただし並みの人間が同じことをしても悟りが開けるとは限りません。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🤔", "text": "知れば知るほど、自分が何も知らないということがわかってきて、自信を持って何かを言えなくなってきました。会議でも「本当にそうなのか」という疑問が先に来て、発言できない。これって知識が増えた証拠と思えばいいですか？それとも何かが間違っていますか？確信を持って話せる人が羨ましいです。", "who": "🏛️ ソクラテス", "trivia": "ソクラテスは「無知の知」——自分が無知であることを知っていることこそが知恵の始まりだと説きました。問答法で相手の矛盾を明らかにする手法が嫌われ、最終的に「若者を堕落させた罪」で裁判にかけられ毒杯を飲んで死刑になりました。知ることは危険を伴うこともあります。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🛢️", "text": "断捨離が止まらなくて、家の中がどんどん空になっています。最近は家具も捨てて、必要最低限のものだけになりました。次は何を捨てればいいか毎日考えています。「行きすぎだ」と言われますが、物が減るたびに頭が軽くなる感じがして、もっとやりたくなってしまいます。この先、何も持たない状態になったら幸せになれると思いますか？", "who": "🛢️ ディオゲネス（犬儒派）", "trivia": "哲学者ディオゲネスは大きな壺（樽）の中に住み、財産を持たずランプを昼間も持ち歩いて「正直な人間を探している」と言い続けました。アレクサンドロス大王が「望むものを何でも与えよう」と言ったとき「日向ぼっこの邪魔だからそこを退いてくれ」と答えた逸話が有名です。", "source": "world", "r18": false}, {"cat": "life", "avatar": "⏰", "text": "時間の使い方がずっと下手で、毎日気づいたら何もせずに夜になっています。やりたいことはたくさんあるのに、着手できないまま時間が溶けていく感覚。これが30年続いたら、死ぬ時に何も残っていないんじゃないかと怖くなってきました。時間は奪われているのか、自分で手放しているのか、どちらですか？", "who": "⏰ セネカ", "trivia": "ストア哲学者セネカは「人生の短さについて」という著作で「人生は短いのではなく、無駄に使っているだけだ」と書きました。「時間は奪われるのではなく、あなた自身が手放している」という言葉は2000年後の現代でも刺さります。セネカ自身は最終的に皇帝ネロに自殺を命じられています。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🌅", "text": "若い頃は散々遊び回って、30代になって急に「このままではいけない」と思い始めました。改心しようとしているのですが、過去の自分がよみがえってくる感覚があって、なかなか本当に変われている気がしないです。「お前が改心？」と笑われるのも怖くて。今更まじめに生きることって、可能ですか？", "who": "✝️ アウグスティヌス", "trivia": "アウグスティヌスは若い頃に愛人を持ち放蕩な生活を送りながら「神よ、私に純潔を与えてください。でも今すぐではなく」と祈ったとされます。33歳でキリスト教に改宗し、後に北アフリカの司教となり「告白録」を著した聖人です。人は変われます。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🍃", "text": "全てを捨てて田舎に移住したいのですが、親にも友人にも全員に反対されています。「逃げだ」「現実を見ろ」「もったいない」。でも都市での生活が本当に合っていなくて、毎日息が詰まります。自分の直感を信じていいのか、周りの声を聞くべきなのか。正しい選択の判断基準って何ですか？", "who": "🍃 良寛", "trivia": "良寛は若い頃に出家し、越後（現在の新潟）の草庵で一人質素に暮らしながら詩歌・書道・子供たちとの遊びに生涯を捧げました。托鉢で生活し「散る桜 残る桜も 散る桜」と詠んだとされます。江戸時代最大の「世捨て人成功例」です。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "🧘", "text": "40歳を過ぎて、突然「自分は何のために生きているのか」という問いが止まらなくなりました。仕事も家族も順調で、傍から見ると恵まれているはずなのに、この空虚感はなんですか。何かが足りない感覚が消えないまま、毎晩眠れなくなっています。これって中年クライシスですか？それとも、何かが始まるサインですか？", "who": "☪️ ムハンマド", "trivia": "ムハンマドは40歳頃に瞑想中に突然「読め」という啓示を受け、それまで普通の商人として生きていた人生が一変しました。「40歳から人生が始まる」という言葉は様々な文化にありますが、その元祖の一人かもしれません。変化は何歳からでも起こります。", "source": "world", "r18": false}, {"cat": "adult", "avatar": "⚡", "text": "婚活で相手に合わせようと、白いスーツを着たり高級車で迎えに行ったり、相手の好みに変装して近づこうとしているのですが全然うまくいきません。先日は「白鳥みたいなスーツ」と言って笑われました。変身して相手に近づくという手法、やっぱり見破られてしまうものですか？それとも変身の質の問題ですか？", "who": "⚡ ゼウス（ギリシャ神話）", "trivia": "ゼウスはレダには白鳥に、ダナエーには黄金の雨に、エウロペには白い牡牛に変身して近づきました。現代的には完全アウトな手口ですが、神話ではこれが英雄誕生の序章として語られます。ヘラクレスもカストルもポルックスもこうして生まれました。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🌺", "text": "夫が長期出張中に、職場の同僚と浮気をしていました。もう数ヶ月になります。夫のことはほぼ忘れかけていたのですが、先日突然「明日帰る」と連絡が来て、頭が真っ白になりました。とりあえず相手を追い出してお風呂に案内したのですが、その後どうすればいいか全くわかりません。こういう状況を収拾した経験のある方がいたら、どうか知恵を貸してください。", "who": "⚔️ クリュタイムネーストラー（ギリシャ神話）", "trivia": "クリュタイムネーストラーはトロイア戦争に出かけた夫アガメムノーン（10年不在）の間に愛人を作り、帰還した夫を風呂場で殺害しました。その後子供たちに復讐され息子オレステスに殺されます。アイスキュロス「オレステイア三部作」として演じられる復讐の連鎖の大悲劇です。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🎵", "text": "遠距離の元カノを取り戻すために会いに行って、「もう一度チャンスをあげる、でも一つだけ条件がある。別れた理由を絶対に蒸し返さないで」と言われました。「わかった」と約束したのに、帰り道のエレベーターでつい昔の話を持ち出してしまって、また振られました。なぜあの瞬間に黙っていられなかったのか、今でも自分でも謎です。", "who": "🎵 オルフェウス（ギリシャ神話）", "trivia": "オルフェウスは冥界に降り竪琴の演奏で冥王ハデスを感動させ死んだ妻エウリュディケの解放を許されました。「地上に出るまで振り返るな」という条件でしたが、あと少しというところで振り返り妻は冥界に戻されます。「なぜ振り返ったのか」は今も謎であり人類共通の弱さの象徴です。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "💃", "text": "好きな人の前でダンスを踊ったら「すごい、何でも一つお願いを叶えてあげる」と言ってくれました。その場の雰囲気で「じゃあ……」と言ったのですが、自分でも驚くようなことをお願いしてしまいました。後から考えると、本当にそれが欲しかったのかよくわかりません。衝動的なお願いをしてしまった経験のある方、その後どうなりましたか？", "who": "💃 サロメ（聖書・新約）", "trivia": "ヘロデ王の前で踊ったサロメは「望むものを何でも与える」と言われ、母の唆しにより洗礼者ヨハネの首を所望しました。オスカー・ワイルドの戯曲「サロメ」（1893年）でファム・ファタール（魔性の女）の象徴として描かれ、世界中でオペラ・絵画・映画に影響を与えています。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "💋", "text": "生涯でできるだけ多くの人と真剣に向き合うことを目標にしています。毎回本気で、毎回全力です。でも周りから「遊んでいる」と思われてしまいます。量と質は両立できると信じているのですが、なかなか理解されません。記録を丁寧につけているのですが、それを見せると引かれてしまうのも悩みの一つです。", "who": "💋 ジャコモ・カサノバ", "trivia": "カサノバは自伝「我が生涯の歴史」に自らの恋愛遍歴を詳細に記録しました。関係を持った女性は100人以上とされます。ヴェネツィア生まれで外交官・スパイ・作家・冒険家でもあり、「カサノバ」という名前は今も「プレイボーイ」の代名詞として世界中で使われています。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "🔱", "text": "職場の上司（既婚）のことを本気で好きになってしまいました。仕事上のやりとりが増えてから、明らかに特別扱いされていると感じていて、相手も私に好意があると思っています。関係を深めることのリスクは百も承知です。でも、気づいたら深みにはまっていました。製造業系の寡黙なタイプで、それがまたよくて。どうすればいいですか？", "who": "💞 アフロディテ（ギリシャ神話）", "trivia": "愛と美の女神アフロディテは鍛冶神ヘパイストスと結婚しましたが、軍神アレスと不倫を続けました。ヘパイストスが透明な金属の網で二人を捕らえ神々の前に晒した話は神話の有名なエピソードです。工場（神の工房）の夫を裏切った妻の話として語り継がれています。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🌿", "text": "年下の義理の子に本気で恋をしてしまいました。ずっと隠していたのですが、先日気の迷いで気持ちを伝えてしまいました。相手には完全に拒絶されて、「気持ち悪い」とまで言われました。その言葉が頭に刺さっていて、じわじわと「あいつが悪い」という気持ちが出てきていて、自分でも怖いです。この感情をどう処理すればいいですか？", "who": "🌿 パイドラー（ギリシャ神話）", "trivia": "パイドラーはテーセウスの妻でありながら継息子ヒッポリュトスに恋し、拒絶されると「逆に迫られた」と夫に虚偽告発しました。テーセウスが息子を呪ったためヒッポリュトスは死に、パイドラー自身も自害します。ラシーヌの悲劇「フェードル」として今も世界中で上演されています。", "source": "myth", "r18": true}, {"cat": "work", "avatar": "🎻", "text": "音楽の仕事をしているのですが、クライアントから「もっと明るい曲を書いてくれ」と言われ続けています。私の作風は暗くて重いのですが、それが自分の本質なので変えたくない。でも生活費が必要なので断れない。自分の表現と生計を天秤にかけ続けるのが、本当につらいです。妥協したら自分じゃなくなる気がして。", "who": "🎻 ルートヴィヒ・ヴァン・ベートーヴェン", "trivia": "ベートーヴェンは聴覚を失いながらも交響曲第9番を含む傑作を作り続けました。スポンサーとの関係では自分の芸術的信念を曲げることを嫌い、しばしば衝突しました。「運命」「月光」などは依頼とは無関係に生まれた作品も多く、生涯を通じて妥協と戦い続けた作曲家です。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🎹", "text": "幼い頃から「神童」と呼ばれてきたのですが、大人になったら周りへの新鮮さが消えてきました。子どもの頃は褒められるだけでよかったのに、今は「次は何を出すんだ」というプレッシャーしかない。才能があるって、幸せなことだと思っていたのに、全然そうじゃなかったです。", "who": "🎹 ヴォルフガング・アマデウス・モーツァルト", "trivia": "モーツァルトは4歳でピアノを弾き6歳から演奏旅行を始めた神童でした。しかし成人後はウィーンで経済的に苦しい生活を送り、35歳で死去。葬儀はひっそりと行われ、墓の場所も不明です。「天才の孤独」と「神童の重圧」を体現した人物です。", "source": "world", "r18": false}, {"cat": "love", "avatar": "💌", "text": "好きな人に手紙を送り続けているのですが、返事が来たことがありません。それでも書くのをやめられないんです。もう100通を超えました。相手は私の手紙を読んでいるはずなのに、何も言ってこない。これって迷惑ですか？それとも、届いていない可能性もありますか？", "who": "💌 ルートヴィヒ・ヴァン・ベートーヴェン", "trivia": "ベートーヴェンの遺品から「不滅の恋人へ」と題された送られていない手紙が3通見つかりました。誰に宛てたものかは今も謎です。生涯を通じて何度も恋をしましたが、すべて実らず独身のまま死去しました。届かない愛を書き続けた人物の元祖の一人です。", "source": "world", "r18": false}, {"cat": "sns", "avatar": "✒️", "text": "社会の矛盾を書いたコンテンツが大炎上しました。権力者への批判を書いたら、アカウントを凍結されただけでなく、リアルでの活動もいくつか制限を受けています。それでも書くのをやめる気はありません。言論って、本当に自由なんですか？", "who": "✒️ ヴォルテール", "trivia": "ヴォルテールは権力や宗教への風刺で何度も投獄・国外追放されました。それでもペンを止めず、「カンディード」などの著作を残しました。「私はあなたの意見には反対だが、あなたがそれを言う権利は命をかけて守る」という言葉で有名です（実際には後世の引用の可能性あり）。", "source": "literature", "r18": false}, {"cat": "life", "avatar": "🕯️", "text": "私は「人間は本来善だ」と信じているのですが、周りの友人からは「甘い」「社会を知らない」と笑われます。都市から離れて自然の中で生きるべきだという主張も「非現実的」と言われます。でも、文明が人間を堕落させているという確信は揺らぎません。この考えって、本当におかしいですか？", "who": "🌿 ジャン＝ジャック・ルソー", "trivia": "ルソーは「人間は自然状態では善だが、社会が悪にする」と主張し、「社会契約論」「エミール」などを著しました。その思想はフランス革命に大きな影響を与えました。自身の5人の子供を全員孤児院に送るという行動との矛盾が有名な逸話として残っています。", "source": "literature", "r18": false}, {"cat": "work", "avatar": "⚗️", "text": "研究成果が出ているのに、「女性だから」という理由で学会での発表を認めてもらえませんでした。夫の名前で発表することを求められています。自分の仕事なのに、なぜ自分の名前で残せないのか。これは普通のことですか？", "who": "🧪 マリー・アンヌ・ピエレット・ポールズ（ラヴォアジェ夫人）", "trivia": "アントワーヌ・ラヴォアジェの妻マリー＝アンヌは夫の化学実験を補助し、外国語文献を翻訳し、実験のイラストを描き、実質的な共同研究者でしたが、功績は夫名義で発表されました。18世紀の科学の世界における女性研究者の制約を象徴する人物です。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🔬", "text": "実験を何千回も繰り返しているのですが、同僚から「そんなに地道にやっても意味がない、もっと効率的にしろ」と言われます。でも私には、この「繰り返し」の中にしか真実を見つける方法がないんです。地道さって、才能のなさの言い訳ですか？それとも、才能の一種ですか？", "who": "🦠 ルイ・パスツール", "trivia": "パスツールは狂犬病ワクチン・低温殺菌法・発酵の仕組みなど、医学と食品科学を変えた業績を残しました。その方法論は徹底的な実験の反復と観察で、「チャンスは準備された心だけに訪れる」という言葉を残しています。地道さが科学の歴史を変えた人物です。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🌊", "text": "人生の後半になって、若い頃の過ちを文章に書き残しておきたいと思い始めました。恥ずかしいことも、間違えたことも、全部正直に。でも「そんなもの誰が読む」「みっともない」と言われます。自分の失敗を正直に記録することに、意味はありますか？", "who": "📔 ジャン＝ジャック・ルソー", "trivia": "ルソーは「告白」という自伝で自身の恥ずかしい行為や過ちを赤裸々に書き残しました。近代的な自伝文学の先駆けとされ、「自己を正直に書く」という文学の形式を確立しました。5人の子を孤児院に送ったことへの自己弁護も含まれており、読者の評価は今も割れています。", "source": "literature", "r18": false}, {"cat": "sns", "avatar": "🗞️", "text": "自分のメディア（ブログ）で時事問題を書き続けているのですが、フォロワーが増えるにつれて、批判も増えてきました。「偏っている」「影響力を持つな」と言われますが、影響力を持つことのどこが悪いのかわかりません。発信し続けることで社会は変わると信じています。", "who": "📰 エミール・ゾラ", "trivia": "ゾラは「私は告発する！（J\\',\nsource:", "source": "literature", "r18": false}, {"cat": "love", "avatar": "🌹", "text": "片思いの相手に詩を書いて送り続けているのですが、一向に効果がありません。詩の出来は自分でも悪くないと思うのですが。「直接告白しろ」と友人に言われますが、言葉にすれば伝わると信じています。詩で恋を勝ち取った人っていますか？", "who": "💐 ヴィクトル・ユゴー", "trivia": "ユゴーは「レ・ミゼラブル」の作者として有名ですが、生涯を通じて多くの恋愛をしました。妻アデルに加え、生涯の愛人ジュリエット・ドルエとの関係は50年以上続きました。詩人が恋愛で最強かどうかは不明ですが、少なくとも量は多かった人物です。", "source": "literature", "r18": false}, {"cat": "work", "avatar": "🏭", "text": "工場の仕事をしているのですが、同じ動作を1日に数百回繰り返すことで、逆に頭の中がものすごくクリアになってきました。単純作業が精神的にも向いているみたいで、周りから「もったいない」と言われますが、私には合っています。単純作業の中に喜びを見つけることって、負けですか？", "who": "⚙️ フレデリック・ウィンスロー・テイラー", "trivia": "テイラーは工場労働の動作を細かく分析し「科学的管理法」を生み出しました。同じ動作の反復を最適化することで生産性を大幅に上げることに成功しました。現代の製造業・物流業の基礎を作った人物ですが、「人間を機械扱いしている」という批判も受け続けました。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🎭", "text": "世の中は全て「舞台」で、人間はみんな役を演じているだけだと思えてきました。私も職場では「できる社員」を演じ、家では「いい子」を演じています。どれが本当の自分なのかわからなくなってきています。仮面を外した自分って、いるんでしょうか。", "who": "🎭 ウィリアム・シェイクスピア", "trivia": "シェイクスピアは「お気に召すまま」の中で「全世界は舞台、男も女もみな役者にすぎない」という有名なセリフを書きました。人間の役割と本質についてのこの問いは、400年以上経った今もあらゆる演劇・映画・心理学に影響を与え続けています。", "source": "literature", "r18": false}, {"cat": "love", "avatar": "🦢", "text": "結婚を3回しています。1回目は情熱で、2回目は安定のため、3回目は……よくわかりません。毎回「今度こそ」と思うのですが、うまくいきません。周りからは「またか」という目で見られますが、諦めたくないんです。何度失敗しても結婚を信じている私は、おかしいですか？", "who": "👑 ヘンリー8世（再登場）/ または 🦁 ジョルジュ・サンド", "trivia": "作家ジョルジュ・サンド（本名オーロール・デュパン）は男性のペンネームを使い、男装で社交界に出入りし、ショパンやミュッセなど多くの著名人と恋愛関係を持ちました。「自分らしく生きる権利」を体現した19世紀フランスの異端児です。", "source": "literature", "r18": false}, {"cat": "sns", "avatar": "📸", "text": "自分の日常を事細かに記録することに取り憑かれています。食事・移動・会話・天気・感情……全部ノートに書き残しています。これが積み重なって、いつか意味を持つと信じているのですが、周りには「病的だ」と言われます。記録することに意味はありますか？", "who": "📔 サミュエル・ピープス", "trivia": "17世紀のイギリス人サミュエル・ピープスは9年間にわたって詳細な日記を書き続けました。ペスト流行・ロンドン大火など歴史的事件から日常の出来事まで記録した日記は、現在も17世紀ロンドンの一次資料として研究者に活用されています。記録の鬼の元祖です。", "source": "literature", "r18": false}, {"cat": "work", "avatar": "🌍", "text": "大きなプロジェクトを完遂するのに5年かかりました。でも誰も「すごい」と言ってくれなくて、「遅すぎた」「もうこの情報は古い」と言われました。5年間、費用も体力も全部つぎ込んだのに。時間をかけた仕事って、評価されにくいものですか？", "who": "🗺️ フェルディナンド・マゼラン", "trivia": "マゼランは世界一周航海（1519〜1522年）を計画・出発しましたが、フィリピンで戦死しています。世界一周を完遂したのは部下のエルカーノでした。出発した本人が帰ってこられなかった大プロジェクトの元祖です。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🕊️", "text": "暴力を使わずに相手を変えることができると信じていて、ずっとそれを実践してきました。でも周りからは「甘い」「現実を見ろ」と言われます。結局、世の中は力で動いているんですか？言葉と行動だけで何かを変えることって、本当に可能なのでしょうか。", "who": "🕊️ マハトマ・ガンジー", "trivia": "ガンジーは非暴力・不服従を原則にイギリスからのインド独立を勝ち取りました。「目には目を」では世界が盲目になると語りました。暗殺されるという皮肉な最期を迎えましたが、マーティン・ルーサー・キングやネルソン・マンデラなど後世の非暴力運動に多大な影響を与えています。", "source": "world", "r18": false}, {"cat": "work", "avatar": "⚓", "text": "海外に出て一旗揚げようとしたのですが、現地のルールが全く違いすぎて毎日失敗しています。言葉も通じないし、文化も違いすぎる。それでも帰るに帰れない状況で、前に進むしかないんです。異文化の中でゼロから始めた経験のある方、最初の壁ってどうやって乗り越えましたか？", "who": "🌏 シーボルト", "trivia": "フィリップ・フランツ・フォン・シーボルトは19世紀初頭に日本に来た医師・博物学者で、鎖国中の日本で西洋医学を広めました。しかし地図の国外持ち出しが発覚し（シーボルト事件）追放されました。文化の橋渡しをしながら禁じられた一線を越えてしまった人物です。", "source": "world", "r18": false}, {"cat": "love", "avatar": "🎼", "text": "パートナーが病気で長期療養中です。一緒に仕事もできなくなり、支えているのか重荷に思っているのかわからなくなることがあります。愛しているのは本当なのに、「逃げたい」という気持ちが頭をよぎることがあって、その感情が嫌で嫌でたまりません。こういう感情を持つ自分は最低ですか？", "who": "🎹 フレデリック・ショパン", "trivia": "ショパンは結核を患い長期にわたる闘病生活を送りました。愛人の作家ジョルジュ・サンドとの9年間の関係は、サンドが介護しながら支え続けましたが、最終的に関係は破綻します。介護関係における愛情と限界の問題は19世紀から変わらないテーマです。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🌋", "text": "幼い頃から「普通じゃない」と言われ続けてきました。ちゃんとした家で育てられなかったし、正式な教育も受けていない。でも、なぜか世の中の仕組みが自分には見えていて、周りより先のことが読めます。この感覚、信じていいですか？それとも、思い上がりですか？", "who": "🏰 ナポレオン・ボナパルト", "trivia": "ナポレオンはコルシカ島出身のフランス語もなまりがあった「外国人」として士官学校でいじめを受けながらも、革命後の混乱期に頭角を現し皇帝にまで上り詰めました。「不可能という言葉は私の辞書にはない」という言葉は後世の人が作った可能性が高いですが、その生き様は本物でした。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🖊️", "text": "書いたものがことごとく出版を断られています。10社以上に送りましたが全部NG。「才能がない」のか「タイミングが悪い」のかもわかりません。それでも書くのをやめる気はないのですが、正直、もう疲れてきました。諦めないことと、撤退の判断って、どう区別すればいいですか？", "who": "✍️ スタンダール（マリ＝アンリ・ベール）", "trivia": "スタンダールは「赤と黒」「パルムの僧院」などで知られますが、生前は評価されず「自分の作品は1880年頃に読まれるだろう」と予言通り死後に評価されました。「50人の幸福な人々（読者）がいれば十分だ」とも語っています。死後評価された作家の代表例です。", "source": "literature", "r18": false}, {"cat": "sns", "avatar": "🗣️", "text": "昔やっていたことで書いた回顧録が予想外に読まれています。「あの時代のことをもっと教えてほしい」という声もあるのですが、書けば書くほど「盛っている」「都合よく書いている」と言われます。自分の体験談って、どこまで信頼してもらえるものですか？", "who": "📖 ベンジャミン・フランクリン", "trivia": "フランクリンは自伝を晩年に書きましたが、未完のまま死去しました。「自伝文学の傑作」とされる一方で、自己美化が多いという批判もあります。政治家・発明家・外交官・著述家として多方面で活躍した人物で、100ドル紙幣に描かれています。", "source": "literature", "r18": false}, {"cat": "work", "avatar": "🔭", "text": "周りの研究者と全然話が合いません。私の考えはあまりにも「先を行きすぎている」と言われるのですが、先を行きすぎることって罪ですか？今の自分が正しいことは確信していますが、証明できるのが50年後になってしまう可能性があって、それが怖いです。", "who": "⚡ マイケル・ファラデー", "trivia": "ファラデーは正式な科学教育を受けていない本の製本職人の出身でしたが、電磁誘導の法則を発見し電気モーターと発電機の原理を作りました。当初は数学者の間で評価されませんでしたが、後にジェームズ・クラーク・マクスウェルが理論的に証明しました。直感と実験が数学より先を行った例です。", "source": "world", "r18": false}, {"cat": "love", "avatar": "📜", "text": "身分違いの恋をしています。相手の家族は当然反対で、こっそり会っています。「身分なんて関係ない」と信じているのですが、会うたびに現実の壁を感じます。愛だけで身分の差を越えた例って、実際にありますか？", "who": "🌹 ヴィクトル・ユゴー（ファンティーヌ）または 📕 シャーロット・ブロンテ", "trivia": "シャーロット・ブロンテの「ジェーン・エア」（1847年）は家庭教師として働く身分の低い女性が雇用主と恋に落ちる物語です。発表当初は「下品だ」「身分秩序を乱す」と批判されましたが、現在は恋愛小説の古典として世界中で読まれています。", "source": "literature", "r18": false}, {"cat": "life", "avatar": "🌐", "text": "海外にいる間に、自分が「よそ者」だということをずっと感じてきました。日本に帰ってきたら今度は「外国かぶれ」と言われます。どこにいても「ここじゃない感」があって、本当に自分が属する場所がどこなのかわからなくなっています。", "who": "🌐 ラフカディオ・ハーン（小泉八雲）", "trivia": "ラフカディオ・ハーンはギリシャ生まれのアイルランド系で、アメリカを経て日本に帰化しました。「怪談」などで日本文化を世界に紹介しましたが、どこの国にも完全には属さない感覚を生涯抱えていたとされます。「どこにも属せない人」の文学的象徴です。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🎶", "text": "子どもの頃から「天才」と言われてきたプレッシャーで、ずっと本当に自分がやりたい音楽ができませんでした。今になってようやく自分の音楽を作り始めたのですが、周りからは「昔の方がよかった」と言われています。成長って、外から見ると後退に見えることがあるんですか？", "who": "🎸 フランツ・リスト", "trivia": "リストは神童ピアニストとして10代でヨーロッパを席巻し、ロックスターのような熱狂的な人気（リストマニア）を誇りました。しかし晩年は宗教に傾倒し修道士の位を受け、以前のような演奏会を行わなくなりました。「昔の方がよかった」と言われ続けた人物の元祖です。", "source": "world", "r18": false}, {"cat": "life", "avatar": "💊", "text": "薬を使って感情や集中力をコントロールしています。本来の自分かどうかわからなくなってきましたが、薬がないと日常生活が送れないのも事実です。これって「本当の自分」じゃないですか？それとも、助けを借りることも含めて「自分」ですか？", "who": "🌿 トーマス・ド・クインシー", "trivia": "19世紀イギリスの作家ド・クインシーはアヘンの常用を「阿片服用者の告白」として赤裸々に書き残しました。当時の痛み止めとしてのアヘン使用の実態と依存の問題を文学として残した先駆的な作品です。薬物依存を文学で描いた最初期の人物の一人。", "source": "literature", "r18": false}, {"cat": "work", "avatar": "🚢", "text": "新しい技術（自動化）を導入しようとしたら、職場の同僚全員に反対されました。「仕事を奪われる」という恐怖からの反発で、機械を壊しに来た人まで出てきました。革新的なことをすると、必ず抵抗に遭いますよね。どうすれば周りを説得できますか？", "who": "⚙️ ジェームズ・ワット", "trivia": "ワットは蒸気機関を改良し産業革命を加速させましたが、新技術の導入には労働者の抵抗（ラッダイト運動）が伴いました。技術革新が既存の仕事を奪うという恐怖は19世紀の問題ではなく、現代のAI導入にも同じ構図があります。", "source": "world", "r18": false}, {"cat": "love", "avatar": "🖋️", "text": "好きな人と文通をしています。直接会うよりも手紙の方が本音が書けて、むしろ手紙でしか本当のことを言えない気がします。でも「会えないなら意味がない」と言われて、関係が終わりそうです。文章でしか伝えられない愛って、本物ですか？", "who": "✉️ ジョン・キーツ", "trivia": "ロマン派詩人キーツはファニー・ブローンへの手紙を大量に書き残しました。「あなたのことを思わずに一行も書けない」と書かれた手紙は今も恋文の傑作とされています。25歳で結核で死去、二人は結婚できませんでした。", "source": "literature", "r18": false}, {"cat": "life", "avatar": "⚖️", "text": "正しいことをしていると信じているのに、社会から孤立してしまいました。誰も理解してくれないし、むしろ「迷惑だ」と言われます。正義を実行することと、周りとの関係を保つことって、両立できますか？", "who": "⚖️ アブラハム・リンカーン", "trivia": "リンカーンは奴隷制度廃止という当時の南部州にとっては「正義」とは見えなかった政策を推し進めました。南北戦争という未曾有の犠牲を経て奴隷解放宣言を出しましたが、暗殺されました。「正しいことをすることは常に人気があるわけではない」を体現した人物です。", "source": "world", "r18": false}, {"cat": "sns", "avatar": "📢", "text": "世の中をよくしようと思って声を上げ続けているのですが、同じ側にいるはずの仲間からも「過激だ」「やりすぎだ」と言われるようになりました。妥協した方がいいのかもしれないとは思うのですが、妥協した瞬間に全部意味を失う気もして。信念と現実の間で揺れています。", "who": "🗽 フレデリック・ダグラス", "trivia": "元奴隷のダグラスは自伝と演説で奴隷制度廃止を訴え続けました。リンカーンとも会い、政策に影響を与えました。アフリカ系アメリカ人として当時の社会に真っ向から抗い続けた人物で、「権力は譲歩を要求されない限り何も譲歩しない」という言葉が有名です。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🔩", "text": "工場の生産ラインを改善するアイデアがあるのですが、上が全然聞いてくれません。「現場のことは現場が一番わかっている」と言っているのに、経営陣は数字しか見ていない。現場の声を経営に届ける方法って、何かありますか？", "who": "🚗 ヘンリー・フォード", "trivia": "フォードは流れ作業による自動車の大量生産（フォード・システム）を発明し、高価だった自動車を一般に普及させました。しかしその「効率化」は労働者を部品のように扱うとも批判されました。現場改善と経営視点のギャップは20世紀初頭から変わらない問題です。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🧭", "text": "人生の目的が「発見すること」なのですが、周りには「何を探しているのかわからない」「いつ落ち着くのか」と言われます。どこかに到達することより、探し続けていることが幸せなんです。「ゴールのない旅」って、意味がありますか？", "who": "🌊 アレクサンダー・フォン・フンボルト", "trivia": "フンボルトは南米・ロシア・アジアを探検し、植物・地質・気候・人類を横断的に研究した19世紀最大の科学者の一人です。「世界を知るには旅をしなければならない」という信念で、生涯探求を続けました。現代の複合科学・環境科学の先駆者とも言われます。", "source": "world", "r18": false}, {"cat": "love", "avatar": "🌺", "text": "年齢差のある恋愛をしています。かなり年上です。周りから「なぜ」と言われますが、その人の知性と経験に本当に惹かれていて、年齢が気になったことは一度もありません。年齢差のある関係って、やっぱり長続きしないものですか？", "who": "📚 ジョルジュ・サンド＆ショパン", "trivia": "ジョルジュ・サンドはショパンより6歳年上で、9年間の関係を続けました。サンドは作家として、ショパンの療養と創作を支えました。最終的に関係は破綻しますが、この期間にショパンは多くの名作を生み出しています。年齢差より関係の質が重要だという一例です。", "source": "literature", "r18": false}, {"cat": "work", "avatar": "🏗️", "text": "誰もやったことのないプロジェクトを立ち上げたのですが、途中で資金が尽きそうになっています。「前例がない」「失敗する」と言われながらも進めてきましたが、あと一歩のところで止まるかもしれません。前例のないことに挑戦する時の資金集めって、どうすればいいですか？", "who": "🗼 ギュスターヴ・エッフェル", "trivia": "エッフェル塔は1889年のパリ万博のために建設されましたが、建設当初は「醜い鉄くず」「パリの恥」と猛烈に批判されました。完成後は撤去が予定されていましたが、無線通信アンテナとして使えることが判明し残されました。批判された構造物が象徴になった話。", "source": "world", "r18": false}, {"cat": "sns", "avatar": "🖼️", "text": "自分の表現スタイルが「時代遅れ」と言われるようになりました。新しいやり方に変えるべきか、自分のスタイルを貫くべきか迷っています。変えたら自分じゃなくなる気がするし、変えなければ誰にも見てもらえない気もして。スタイルを守ることって、頑固と信念のどちらですか？", "who": "🎨 ポール・セザンヌ", "trivia": "セザンヌは印象派の仲間と袂を分かち独自のスタイルを追求しましたが、生前は評価されず落選続きでした。しかしその作品は後のピカソ・マティスらに「近代絵画の父」と称えられました。「自然を円柱・球・円錐で見る」という彼の理論は20世紀美術を変えました。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🕰️", "text": "昔の時代の方がよかったと思うようになってきました。今の社会は便利だけど、何かが失われている気がして。「懐古趣味だ」「時代に乗り遅れている」と言われますが、失われたものへの郷愁って、悪いことですか？", "who": "🏛️ エドマンド・バーク", "trivia": "18世紀のイギリスの政治家・思想家バークはフランス革命を批判し、急進的な変革より伝統と継続性を重んじる「保守主義」の思想的基礎を作りました。「社会は現在の人々だけのものではなく、過去・現在・未来の人々の間の契約だ」という言葉が有名です。", "source": "world", "r18": false}, {"cat": "work", "avatar": "📡", "text": "新しいコミュニケーション技術を発明して、世界を変えたいと思っています。でも、特許の申請が他の人より1時間遅れたせいで、功績を横取りされそうになっています。たった1時間の差で人生が変わるなんて、理不尽すぎます。", "who": "📞 アレクサンダー・グラハム・ベル", "trivia": "ベルは1876年3月7日に電話の特許を取得しましたが、同日にエリシャ・グレイも同様の特許を申請していました。ベルの申請がわずか数時間早かったとされます。「たった数時間の差」で電話の発明者として歴史に名を残しました。", "source": "world", "r18": false}, {"cat": "love", "avatar": "💔", "text": "長年一緒にいたパートナーが、「もっと自分を生きたい」と言って出ていきました。止める言葉が見つからなかったし、止める権利もないとわかっていました。でも一人になってから、初めて自分も「自分を生きていなかった」と気づきました。誰かのために生きることと自分のために生きること、両立できますか？", "who": "🚪 ノラ（イプセン「人形の家」）", "trivia": "ヘンリック・イプセンの「人形の家」（1879年）は、夫と子供を残して家を出ていく妻ノラを描きます。初演時は大スキャンダルになりましたが、現代では女性の自立を描いた近代演劇の傑作とされます。「人形の家のドアを閉める音」は今も世界中で響き続けています。", "source": "literature", "r18": false}, {"cat": "life", "avatar": "🌿", "text": "自然の中でひとりで生活する実験をしています。2年以上、森の近くで自給自足に近い生活をしました。「変わり者」「逃げている」と言われますが、この生活で初めて本当のことを考えられるようになった気がします。孤独って、怖いものじゃないとわかりました。", "who": "🌲 ヘンリー・デイヴィッド・ソロー", "trivia": "ソローは1845年から2年間、ウォールデン池のほとりに小屋を建てて自給自足的な生活を送り「ウォールデン——森の生活」を著しました。「シンプルに生きること、シンプルに生きること」という言葉が有名です。現代のミニマリズムやスローライフの思想的源流の一つです。", "source": "literature", "r18": false}, {"cat": "work", "avatar": "✏️", "text": "書いた文章を全部燃やしてほしいと遺言に書いているのですが、親友から「そんなことしない」と言われています。私が書いたものは公開するつもりで書いていなかったし、未完成のものを人に見せたくないんです。作者の意図って、どこまで尊重されますか？", "who": "📚 フランツ・カフカ", "trivia": "カフカは死の直前に親友マックス・ブロートに全作品の焼却を依頼しましたが、ブロートはそれを無視して出版しました。「変身」「審判」「城」など現代文学の傑作がこうして世に出ました。作者の意志と後世への遺産の間の永遠のジレンマです。", "source": "literature", "r18": false}, {"cat": "sns", "avatar": "🎥", "text": "自分の作品を世に出したいのですが、生きている間に評価されるか自信がありません。「死後に評価された人」の話をよく聞くのですが、本人はどんな気持ちで生きていたのでしょうか。今評価されなくても続けることに意味はありますか？", "who": "🌻 フィンセント・ファン・ゴッホ（再）/ または 🎼 ヨハン・ゼバスティアン・バッハ", "trivia": "バッハは生前「地域の音楽監督」として知られた存在でしたが、世界的な評価が確立したのは死後約100年後のことです。メンデルスゾーンが「マタイ受難曲」を復活上演した1829年が転機とされます。「死後に再発見される作曲家」の元祖的存在です。", "source": "world", "r18": false}, {"cat": "work", "avatar": "🧲", "text": "発明した技術が別の人に改良されて、世界的に普及しているのを見ています。自分がいなければそれは生まれなかったのに、名前は残っていません。ベースを作った人間と、完成させた人間と、どちらが「発明者」なんですか？", "who": "⚡ ニコラ・テスラ", "trivia": "テスラは交流電流システムを発明しエジソンと「電流戦争」を戦いましたが、最終的に交流が普及する一方でテスラ本人は晩年貧困の中で死去しました。現代の電気文明の基礎を作りながら適切な評価を受けなかった人物の代表例です。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🔍", "text": "論理的に考えれば全て解決できると思っているのですが、感情で動く人間が多すぎて困っています。「なぜ合理的に考えられないのか」と思うことが多くて、友人に「冷たい」と言われます。感情より論理を優先することって、そんなに問題ですか？", "who": "🔍 シャーロック・ホームズ（コナン・ドイル）", "trivia": "コナン・ドイルが生み出したホームズは極度の論理主義者で感情表現が乏しく、「社会性のある高機能な人物」として現代でもアスペルガー症候群の文脈で語られることがあります。ドイルは晩年、ホームズを殺そうとしたほど関係に疲れていました。", "source": "literature", "r18": false}, {"cat": "work", "avatar": "🌐", "text": "誰も信じてくれなかったアイデアを、15年かけてやっと形にしました。最初は「無理だ」「意味がない」と言われていたのに、今は「最初からそうだと思っていた」と言う人が増えています。苦しかった15年間は何だったんでしょうか。", "who": "🔬 ロベルト・コッホ", "trivia": "コッホは結核菌・コレラ菌を発見し、感染症の「病原菌説」を確立しました。当初は「空気や体質が病気を引き起こす」という当時の常識に反する主張として抵抗を受けましたが、実験で証明しノーベル賞を受賞しました。科学的証明が常識を変えるまでに必要な時間と忍耐の話です。", "source": "world", "r18": false}, {"cat": "love", "avatar": "🎭", "text": "パートナーと趣味が全く合いません。向こうは社交的で華やかな場所が好き、私は静かで一人でいることが好きです。お互いを尊重しているつもりなのですが、一緒にいる時間が増えるにつれて、どちらかが我慢しているような気がしてきました。正反対の人間が長く一緒にいることって、可能ですか？", "who": "⚡ チャールズ・ディケンズ＆妻キャサリン", "trivia": "ディケンズは「オリバー・ツイスト」などで貧困と社会問題を描いた作家ですが、私生活では妻キャサリンと10人の子を持ちながら別居し、若い女優に傾倒しました。晩年は孤独の中で執筆を続けました。作品の温かさと私生活の冷たさの落差が有名です。", "source": "world", "r18": false}, {"cat": "life", "avatar": "🌬️", "text": "自分の死後に何かを残したいという欲求が強くなってきました。子どもがいないので、作品か思想か、何か「跡」を残さないと存在した意味がない気がして。子孫を残すこと以外で「後世に残る」方法って、何がありますか？", "who": "📖 エミリー・ディキンソン", "trivia": "ディキンソンは生涯のほとんどを家にこもって過ごし、生前に発表した詩は10篇未満でした。しかし死後に発見された1800篇以上の詩は現代アメリカ文学の礎とされます。「名声は蜂のようなもの」と書いた人物が、死後最大の名声を得た皮肉な話です。", "source": "literature", "r18": false}, {"cat": "work", "avatar": "🏆", "text": "自分が立ち上げたプロジェクトが国際的に認められたのですが、その頃にはすでに自分は関わっていませんでした。離れた後に評価されるって、嬉しいはずなのに複雑な気持ちです。手放した後に咲いたものって、自分の功績と言っていいですか？", "who": "🏅 アルフレッド・ノーベル", "trivia": "ノーベルはダイナマイトを発明し巨万の富を築きましたが、自分の発明が戦争に使われることを深く後悔しました。遺言で全財産をノーベル賞の設立に充て、「人類への最大の貢献をした人物を表彰する」と定めました。死後に最も大きな遺産を残した発明家の一人です。", "source": "world", "r18": false}, {"cat": "adult", "avatar": "🏛️", "text": "婚活で完璧な相手を見つけたのですが、相手はすでに6人の元パートナーがいると言っていて、そのうち2人とは死別、2人とは離婚、1人は行方不明だそうです。プロフィールに書いてなかったのですが、これって普通ですか？それでも好きなので付き合いたいのですが、友人全員に反対されています。", "who": "👑 アン・ブーリン（ヘンリー8世の2番目の妃）", "trivia": "ヘンリー8世は6人の妻を持ちましたが、2人を処刑、2人と離婚、1人は出産直後に死去、1人には先立たれました。アン・ブーリンはその2番目の妻で処刑されましたが、後のエリザベス1世の母でもあります。「婚活リスク」として見ると史上最高の赤信号案件です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "⚔️", "text": "職場の飲み会でお酒を飲んだら気が大きくなってしまって、会場のカーテンに火をつけてしまいました。本当に出来心で、深く反省しています。その場で大パニックになったのですが、なぜかそこからトントン拍子で出世してしまいました。これって喜んでいいですか？", "who": "🎸 ジミ・ヘンドリックス（現代）/ または 🔥 ネロ皇帝", "trivia": "ネロ皇帝は64年のローマ大火の際に「自分が火をつけた」という噂が広まりました（現代では否定的）。しかし大火後の都市再建計画を自ら推進し、逆に建築家としての才能を発揮します。災害後に権力基盤を強化した政治家の皮肉な歴史の一例です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "🌹", "text": "パートナーに「私以外の人と話すな」と言われています。仕事の関係上どうしても必要な会話まで制限されていて、正直息が詰まっています。でも相手がいないと不安で離れられないんです。この関係って、愛ですか？それとも別の何かですか？", "who": "♟️ マリー・キュリーとその嫉妬深いパートナー / または 👸 イザベル1世", "trivia": "スペイン女王イザベル1世と夫フェルナンド2世は「カトリック両王」として知られますが、イザベルはフェルナンドの度重なる浮気に苦しみながらも政治的パートナーシップを維持しました。愛と権力と嫉妬が複雑に絡み合った16世紀の政略婚の実態です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "🎨", "text": "アトリエにモデルさんに来てもらって制作をしているのですが、気づいたら恋愛関係になっていました。しかも今は同棲中です。「仕事とプライベートを混同するな」と言われますが、毎日一緒にいたら好きになってしまうのは仕方ないと思うのですが……", "who": "🖌️ オーギュスト・ロダン", "trivia": "彫刻家ロダンは弟子のカミーユ・クローデルと深い関係を持ちました。クローデルは才能ある彫刻家でもありましたが、ロダンとの関係が破綻した後に精神的に追い詰められ、晩年は精神病院で過ごしました。師弟関係・恋愛・嫉妬・才能が絡み合った19世紀の修羅場です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "🏺", "text": "お酒の席でついやらかしてしまいました。記憶がないのですが、どうやら神様（上司）の奥さんと何かあったらしく、翌朝から職場の空気が最悪です。証拠もないし本当に覚えていないのですが、上司の目が完全に怒っています。どう弁明すればいいですか？", "who": "🍷 アレース（軍神アレス、ギリシャ神話）", "trivia": "軍神アレスはヘパイストスの妻アフロディテと不倫関係にありました。ヘパイストスが仕掛けた透明な金属の網に捕らわれ、神々の前に晒されました。「酔った勢いの言い訳が通じない」という教訓は神話の時代から変わりません。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🦅", "text": "彼女に内緒でアルバイトをしています。正確には彼女の飼い鳥の世話係なのですが、毎日会いに行くうちに彼女のことが本気で好きになってしまいました。でも彼女には別の人がいます。こういう状況、どうすればいいですか？", "who": "🦅 ガニュメデース（ゼウスに連れ去られた美少年、ギリシャ神話）", "trivia": "ゼウスは美少年ガニュメデースに魅せられ、鷲に変身して連れ去り神々の給仕役にしました。これはギリシャ神話における神と人間の関係のみならず、年齢差・権力差のある関係の原型として語られます。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🌙", "text": "夜中に眠れなくて、毎晩同じ場所に行って同じ人を眺めています。本人は私の存在に気づいていません。ただ寝顔を見るだけで満足しているのですが、傍から見るとやばいですよね？でも起こすのは申し訳ない気がして。", "who": "🌙 セレーネ（月の女神、ギリシャ神話）", "trivia": "月の女神セレーネは眠り続ける羊飼いエンデュミオンに恋をし、毎夜山に降りて寝顔を眺め続けたとされます。エンデュミオンを永遠に眠らせたのはゼウスとも、セレーネ自身が願ったとも伝わります。月が毎夜同じ場所を照らすことへの神話的説明です。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🌺", "text": "一目惚れした相手を口説こうとしているのですが、なぜか全然振り向いてもらえません。どんなアプローチをしても無視されます。「愛の矢に当たった」と思っているのですが、相手には別の矢が刺さっているんでしょうか。", "who": "💘 エロース（クピドー、ギリシャ・ローマ神話）", "trivia": "エロース（ローマ名クピドー）は金の矢で恋に落とし、鉛の矢で恋を冷ます力を持っていました。アポロンが恋に落ちたダフネには鉛の矢を放ち、一方的な恋愛状態を作り出したとされます。「なぜか相手が冷たい」は鉛の矢のせいかもしれません。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🍷", "text": "お酒の席で気が大きくなってしまって、今の彼女と別れて新しい人と結婚すると宣言してしまいました。会場に前の彼女もいて大騒ぎになりました。酔った勢いで言ったことでも、責任を取るべきですか？", "who": "🎻 ベートーヴェン（数々の求婚エピソード）", "trivia": "ベートーヴェンは生涯複数回の求婚を試みましたが、すべて失敗しました。テレーゼ・マルファッティへの求婚は彼女の両親に断られ、「エリーゼのために」のモデルとも言われます。「酔った宣言」かどうかは不明ですが、感情の起伏が激しかったことは有名です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "🎭", "text": "舞台の演出上、毎晩キスシーンがあります。最初は「仕事だから」と割り切っていたのですが、最近相手のことが本気で気になり始めてきました。共演者との恋愛って、バレるものですか？バレたとして、何か問題ありますか？", "who": "🎭 ロミオ（シェイクスピア、再登場）", "trivia": "「ロミオとジュリエット」は1590年代の初演以来、俳優同士の共演中の恋愛を生んできた作品として有名です。舞台で愛を演じるうちに本物の感情が生まれる「コクピット効果」は心理学的にも研究されています。芝居と本気の境界線はどこにあるのか。", "source": "literature", "r18": true}, {"cat": "adult", "avatar": "🌊", "text": "仕事柄、毎日美しい人たちに会います。毎回心が揺れてしまって、気づいたら家庭の外でいくつも関係が増えていました。妻にはバレていないと思っていたのですが、最近妻の目が怖いです。どうすればいいですか？", "who": "🔱 ゼウス（再登場）", "trivia": "ゼウスはヘラという正妻がいながら、メティス・テミス・エウリュノメー・デメテール・ムネモシュネー・レトーなど数え切れないほどの浮気相手を持ちました。ヘラの嫉妬と復讐は神話全体を通じての主要テーマです。「妻の目が怖い」は最高神でも同じでした。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🔮", "text": "占いをやっているのですが、お客さんの中に本気で好きな人ができてしまいました。「占い師と客」という関係上、告白していいものかどうか悩んでいます。でもこの気持ち、占いで見ても「吉」が出るんですよね。信じていいですか？", "who": "🔮 ラスプーチン", "trivia": "グリゴリー・ラスプーチンはロシア皇帝一家の信頼を得た怪僧で、病弱な皇太子アレクセイを「治癒」する能力を持つとされました。皇后アレクサンドラとの関係は深く、政治的影響力も持ちました。「占い師と信者」の境界線が曖昧になった歴史的事件の象徴です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "👘", "text": "年下の男性に教えを請われて、いろいろ教えていたのですが、いつの間にか完全に逆転されました。今や向こうの方が私より何でも上手くなっていて、なんか複雑な気持ちです。でも今も好きなんですよね。師弟関係から恋愛になった方いますか？", "who": "🌸 紫の上（源氏物語）", "trivia": "光源氏は幼い紫の上を引き取り、自分の理想の女性に育てました。これは現代では完全にアウトな関係ですが、源氏物語ではメインの恋愛として描かれています。「自分好みに育てる」という関係性の問題を1000年前に文学として描いた紫式部の鋭さは今も研究対象です。", "source": "japan", "r18": true}, {"cat": "adult", "avatar": "🌿", "text": "相手に「私以外の誰とも結婚するな」という手紙を送り続けています。100通を超えましたが返事は来ません。でも諦められないんです。法的に問題になりますか？情熱は罪ですか？", "who": "✉️ ルートヴィヒ2世（バイエルン王）", "trivia": "バイエルン王ルートヴィヒ2世はワーグナーへの熱狂的な支援と崇拝で知られ、手紙を大量に送り続けました。ワーグナーはその支援を利用しつつ、王の感情に距離を置いていたとされます。文化的パトロン関係がいびつな依存に発展した19世紀の事例です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "🎪", "text": "複数の人と同時進行で関係を持っていますが、全員に「あなただけ」と言っています。本当に全員のことが好きなのですが、これって嘘ですか？「愛は分けられる」と信じているのですが。", "who": "💋 カサノバ（再登場）", "trivia": "カサノバは自伝で「すべての女性を本気で愛した」と主張しました。嘘つきなのか本当に分割愛が可能なのかは今も議論があります。現代の「ポリアモリー（複数愛）」の概念が正式に議論されるようになったのはカサノバの時代から200年後のことです。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "🌸", "text": "弟（妹）に「こういう恋愛ってどう思う」と相談されたのですが、内容を聞いたら完全に私自身が当事者の話でした。どう反応すればいいですか？", "who": "🌸 ビュブリース（ギリシャ神話）", "trivia": "ギリシャ神話のビュブリースは双子の兄カウノスへの恋慕を手紙に書いて送りました。兄は拒絶して逃げ去り、ビュブリースは泣き続けて泉になったとされます。禁断の恋を「手紙で告白する」という形式は神話でも繰り返されるテーマです。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🦁", "text": "職場の権力者（既婚）と関係を持っています。向こうから迫ってきたのですが、今となっては私も本気になっています。この関係、続けていいと思いますか？周りは全員反対しています。", "who": "👑 アン・ブーリン（ヘンリー8世の愛人→2番目の妃）", "trivia": "アン・ブーリンはヘンリー8世の愛人から正式な王妃になりましたが、3年後に反逆罪（ほぼ冤罪とされる）で処刑されました。しかし彼女が産んだ娘エリザベスは後のエリザベス1世として「黄金時代」を作ります。「リスクを取った結果」として歴史に残った女性です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "🌊", "text": "書いた小説の中に、自分の実際の恋愛経験を全部入れてしまいました。読んだ人には全部わかるように書いたつもりなのですが、当事者の人に「これ私のこと？」と聞かれたらどう答えればいいですか？", "who": "✍️ スタンダール（「赤と黒」）", "trivia": "スタンダールは「赤と黒」の主人公ジュリアン・ソレルに自身の野心と恋愛経験を投影したとされます。実際の事件（1827年のベルテ事件）を元にしており、現実と小説の境界が曖昧な作品として知られます。「これ私のこと？」は作家が最も恐れる質問です。", "source": "literature", "r18": true}, {"cat": "adult", "avatar": "🎵", "text": "コンサート会場でファンの方から激しいアプローチを受けました。ちょっと怖いくらいの熱量なのですが、正直嫌いじゃないです。こういう場合、応えていいものですか？応えたら後悔しますか？", "who": "🎸 フランツ・リスト（再登場）", "trivia": "リストへの熱狂的なファン現象「リストマニア」では、コンサート後に女性ファンがリストの手袋・折れたピアノの弦・飲み残しのコーヒーまで奪い合ったとされます。「過激なファン」の元祖的存在。現代のアイドル文化の19世紀版です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "⚗️", "text": "研究のために長期間、自分の体で実験をしていたら、気づいたら依存状態になっていました。本人は至って正常のつもりなのですが、周りには「やばい」と言われています。知的好奇心と自己破壊の境界線って、どこにありますか？", "who": "💊 トーマス・ド・クインシー（再登場）", "trivia": "ド・クインシーはもともと歯の痛みに対する処方としてアヘンを使い始めましたが、その体験を「阿片服用者の告白」として文学に昇華しました。自分の依存体験を赤裸々に書くことで、逆に読者に警告を与えた逆説的な作品です。", "source": "literature", "r18": true}, {"cat": "adult", "avatar": "🔑", "text": "お互いに既婚で、何年もこっそり関係を続けています。二人とも離婚する気はないのですが、この関係もやめる気がありません。こういう関係って、永遠に続けられますか？それとも、どこかで必ず終わりが来ますか？", "who": "💋 ジョルジュ・サンド＆ミュッセ（または複数の関係）", "trivia": "ジョルジュ・サンドは生涯を通じて多くの不倫・複数の同時関係を持ちました。詩人アルフレッド・ド・ミュッセとの激烈な関係はイタリア旅行中の喧嘩と仲直りの繰り返しで有名です。「終わりが来るかどうか」——ショパンとの関係は9年続きましたが最終的に破綻しました。", "source": "literature", "r18": true}, {"cat": "adult", "avatar": "🌙", "text": "夜中に誰かの窓の外に立っていたら、偶然気づかれてしまいました。目が合った瞬間は「終わった」と思ったのですが、相手は怖がるどころか窓を開けてくれました。これって何かのサインですか？", "who": "🌹 カサノバ（ベニスの夜の逸話）", "trivia": "カサノバの自伝にはベニスで夜中に女性の部屋の窓下に立ち続けた逸話が複数登場します。当時のベニスでは窓越しのやりとりが恋愛の初期段階として文化的に認められていた面もありました。現代では即アウトな行動も時代と場所によって意味が変わる例です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "💐", "text": "意中の人に詩を毎日送っています。もう50篇を超えましたが反応がありません。でも相手はSNSに「最近誰かから詩が届く」と投稿していました。これ、私のことを意識してますよね？そう思っていいですか？", "who": "🎭 シラノ・ド・ベルジュラック（ロスタン）", "trivia": "エドモン・ロスタンの戯曲「シラノ・ド・ベルジュラック」（1897年）では、大きな鼻にコンプレックスを持つシラノが友人の代わりに恋文を書き続け、自分の気持ちを明かせないまま死にます。「代筆の恋文」が本物になっていく切ない物語。フランス近代演劇の傑作です。", "source": "literature", "r18": true}, {"cat": "adult", "avatar": "🌋", "text": "すごく魅力的な人に会ったのですが、相手は「私に近づいた人は全員石になる（関係が固まる？）」という噂があって、友人には「近づくな」と言われています。でも目が合った瞬間から離れられなくて。危ない恋って、どうして惹かれてしまうんですか？", "who": "🐍 メドゥーサ（ギリシャ神話）", "trivia": "メドゥーサはその目を見た者を石に変える怪物とされましたが、オウィディウスの解釈では元々は美しい女性だったとも伝わります。「危険だとわかっているのに惹かれる」心理は「フォービドゥン・フルーツ効果（禁断の果実効果）」として心理学でも研究されています。", "source": "myth", "r18": true}, {"cat": "adult", "avatar": "🎨", "text": "弟子に「先生の作風を継ぎたい」と言われて、いろいろ教えていたのですが、その弟子が独自のスタイルを確立して私より有名になりました。悔しい気持ちと誇らしい気持ちが混在していて、なんとも言えない感情です。これって愛情ですか、嫉妬ですか？", "who": "🖌️ カミーユ・クローデル＆ロダン（逆の視点）", "trivia": "カミーユ・クローデルはロダンの弟子であり愛人でありながら、独自の才能を持った彫刻家でした。ロダンとの決別後は精神的に崩壊し、晩年を精神病院で過ごしました。師と弟子、恋人と芸術家、嫉妬と愛情が複雑に絡み合った19世紀の悲劇的関係です。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "👑", "text": "政略的な結婚をしたのですが、相手がまったく好みじゃなくて困っています。義務は果たしているのですが、別に好きな人もいて。こういう場合、どちらかに集中すべきですか？それとも両立は可能ですか？", "who": "👑 カトリーヌ・ド・メディシス", "trivia": "フランス王妃カトリーヌ・ド・メディシスはアンリ2世の王妃でしたが、夫はディアーヌ・ド・ポワティエという愛人を生涯愛し続けました。カトリーヌは嫉妬に苦しみながらも10人の子を産み、夫の死後は実質的にフランスの政治を動かす存在になります。", "source": "world", "r18": true}, {"cat": "adult", "avatar": "🌺", "text": "自分の子供の恋人を好きになってしまいました。何度も気持ちを断ち切ろうとしているのですが、なぜか会う機会がどんどん増えています。これって偶然ですか？運命ですか？それとも、私が無意識に会う状況を作り出していますか？", "who": "🌿 アフロディテ（我が子エロースへの複雑な感情）または 💐 ウェヌス（ローマ）", "trivia": "ローマ神話でウェヌス（アフロディテ）は我が子クピドー（エロース）と常に行動を共にし、その矢で人々を恋に落とします。神話学者によっては「母子の共依存」として分析されることもあります。愛の女神が「愛の矢」の管理者でもあるという神話の矛盾は現代の心理分析でも注目されています。", "source": "myth", "r18": true}, {"cat": "work", "avatar": "🌺", "text": "部下に「あなたのためならどこまでもついていきます」と言われて本当に嬉しかったのですが、その部下が最近よその派閥とも仲良くしているのを見かけました。信用していいのか、慎重に観察すべきか悩んでいます。人を信じることと用心することって、両立できますか？", "who": "🌺 豊臣秀吉（石田三成との関係）", "trivia": "秀吉の忠臣・石田三成は秀吉への忠義で知られましたが、他の武将たちとの軋轢が絶えませんでした。秀吉の死後、三成は関ヶ原の戦いで家康に敗れます。信頼と警戒のバランスは戦国武将の永遠の課題でした。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "🌸", "text": "好きな人がいるのですが、家柄の差がありすぎて親に猛反対されています。「身分が違う」「家の格が違う」と言われ続けています。でも本人同士は気持ちが通じ合っていると思っています。身分差のある恋愛って、今の時代でも難しいですか？", "who": "🌸 お市の方と柴田勝家", "trivia": "織田信長の妹・お市の方は信長の政略で一度は浅井長政に嫁ぎ、長政の死後に柴田勝家と再婚しました。しかし勝家は秀吉に敗れ、お市は勝家と共に自害します。戦国時代の女性の恋愛は常に政治と隣り合わせでした。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "⚔️", "text": "優秀な部下を引き抜いてうまく使うのが得意なのですが、最近その部下が私の意見より自分の判断で動くことが増えてきました。育てすぎると手に負えなくなる、という話は本当ですか？それとも、自分で動ける部下こそ理想ですか？", "who": "⚔️ 織田信長と羽柴秀吉", "trivia": "信長は低身分の秀吉を抜擢し重用しましたが、秀吉は信長の死後（本能寺の変）に誰よりも早く対応し天下を取ります。「育てた部下に抜かれる」という上司の永遠の悩みの元祖的関係です。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "🏯", "text": "長年かけて築いてきたものが、自分の死後に崩れてしまうんじゃないかという不安があります。後継者を育てているつもりなのですが、本当に大丈夫か自信が持てません。自分がいなくなった後のことを考えると眠れません。", "who": "🏯 徳川家康（徳川幕府の設計）", "trivia": "家康は自分の死後も徳川家が支配し続けられるよう、参勤交代・武家諸法度など徹底した制度設計を行いました。その幕府体制は265年間続きます。「自分亡き後」を考え抜いた制度設計の元祖です。", "source": "japan", "r18": false}, {"cat": "sns", "avatar": "📜", "text": "自分の考えをまとめた文書を世に出したら、予想以上に反響があって、あちこちから「賛同する」「一緒に戦おう」という連絡が来ています。でも実際に動くとなると、本当に全員が信用できるのか不安で。SNSで仲間を集めるのと同じ感覚なのですが、どこまで信じていいですか？", "who": "📜 坂本龍馬（船中八策・薩長同盟）", "trivia": "龍馬は薩摩・長州という仇敵同士を同盟させるという離れ業をやってのけました。しかし1867年、大政奉還の直前に暗殺されます。改革の途中での死という悲劇は、日本史上最大の「志半ば」の象徴です。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🎨", "text": "絵師として有名になったのですが、最近若い作家たちが私のスタイルを真似した作品を大量に出しています。影響を与えられているのは嬉しいのですが、「本家」としての存在感が薄まっていく気がして複雑です。パクられ続けるのって、名誉ですか？それとも損ですか？", "who": "🎨 葛飾北斎", "trivia": "葛飾北斎の「富嶽三十六景」などの作品はゴッホやモネなど西洋の印象派にも多大な影響を与えました（ジャポニスム）。北斎は90歳まで描き続け「死ぬ前にあと10年あれば本当の絵師になれたのに」と言い残したとされます。影響力が国境を超えた最初の日本人画家の一人です。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "🌊", "text": "若い頃から「これが自分の道だ」と信じてひたすら一つのことを磨いてきたのですが、40代になって「本当にこれでよかったのか」という疑問が出てきました。一道を極めることと、広く生きることと、どちらが正解でしたか？", "who": "🗡️ 宮本武蔵", "trivia": "宮本武蔵は剣の道を極めながら晩年は「五輪書」を著し、絵画・彫刻・工芸にも才能を発揮しました。「我、神仏を尊び、神仏を頼らず」という言葉が有名です。一道を究めた先に見えた境地を書き残した作品は今も兵法書・哲学書として読まれています。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🏮", "text": "新しいビジネスモデルを持ち込んで既存の業界を破壊しようとしているのですが、既得権益を持つ人たちから猛烈な反発を受けています。「業界のルールを壊すな」と言われますが、壊さないと前に進めないんです。改革者って、孤独なものですか？", "who": "🏮 織田信長（楽市楽座）", "trivia": "信長の楽市楽座は商工業者の既得権益（座）を廃止し自由な商売を認めた画期的な政策でした。既存の利権を持つ寺社勢力との対立は激化し、比叡山延暦寺の焼き討ちにも繋がります。経済改革と既得権益の衝突は戦国時代から変わらないテーマです。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "💌", "text": "手紙を書くことで気持ちを伝えるのが得意なのですが、直接会って話すのがひどく苦手です。文章では「うまい」と言われるのに、対面すると言葉が出てきません。文章上手でコミュ障って、どうすれば改善できますか？", "who": "💌 紫式部", "trivia": "紫式部は「源氏物語」という世界初の長編小説を書いた天才作家でしたが、日記には「人付き合いが苦手で引きこもりがち」「清少納言のような派手な自己表現が苦手」と書かれています。文章の天才が対人関係を苦手としていた、という記録が残る稀有な人物です。", "source": "japan", "r18": false}, {"cat": "sns", "avatar": "✍️", "text": "毎日日常のことや感じたことを記録しているのですが、最近それが他の人に読まれていることを知りました。プライベートのつもりで書いていたのに、勝手に広まっていて複雑な気持ちです。でも「面白い」と言ってもらえるのは嬉しくもあって。", "who": "📖 清少納言（枕草子）", "trivia": "清少納言の「枕草子」は当初、私的なメモとして書かれたものでしたが、宮中で広まり現在は日本最古のエッセイ集として世界的に評価されています。「春はあけぼの」で始まるこの作品は1000年後も読まれ続けています。意図せず公開された文章が名作になった例です。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🎵", "text": "音楽の仕事をしているのですが、クライアント（将軍）から「もっと楽しい曲を作れ」「気分が上がるものを」と言われています。でも私の本当にやりたい音楽はもっと深くて静かなものです。大衆ウケと芸術性って、両立できますか？", "who": "🎵 世阿弥", "trivia": "能楽の大成者・世阿弥は足利義満に重用されましたが、義満の死後に後継者問題に巻き込まれ、晩年は佐渡島に流されました。「風姿花伝」は芸術論の古典として今も読まれています。「花」という概念で芸術の本質を説いた人物です。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "🌿", "text": "出家して静かな場所で暮らしたいと思っているのですが、周りに「逃げだ」「もったいない」と言われます。世俗の喧騒から離れて、自分のやりたいことだけをする生活って、本当に幸せなんですか？経験者に聞きたいです。", "who": "🌿 鴨長明（方丈記）", "trivia": "鴨長明は都の競争社会から離れ、一丈四方（約3畳）の小屋「方丈庵」で晩年を過ごしました。「ゆく河の流れは絶えずして…」で始まる「方丈記」は無常観を書いた鎌倉時代の随筆で、ミニマリズムの元祖とも言えます。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🏹", "text": "実力で上り詰めたのですが、生まれや出自を馬鹿にされることが今でもあります。「どうせ田舎者」「家柄が違う」という目線が消えなくて。実力があっても、出身で判断され続けることってありますか？", "who": "🐒 豊臣秀吉（百姓出身）", "trivia": "秀吉は百姓（あるいは足軽）の出身でしたが天下人になりました。しかし関白になった後も公家や大名から「出自が卑しい」と陰口を言われ続けたとされます。どれだけ出世しても出自へのコンプレックスは消えなかったとも言われています。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "🏔️", "text": "ずっと遠くから思い続けている人がいます。近くにいても気持ちを伝えられないまま何年も経ちました。この気持ちを言葉にするとしたら、どう表現すればいいですか？言葉にしたとたんに何か大切なものが壊れそうで怖いんです。", "who": "🏔️ 在原業平（伊勢物語より）", "trivia": "在原業平の歌「ちはやぶる神代もきかず竜田川 からくれなゐに水くくるとは」は、言葉では言い表せない美しさと感情を詠んだ和歌です。平安時代の「色男」として知られながら、その恋愛のほとんどは成就しなかったとも言われています。", "source": "japan", "r18": false}, {"cat": "sns", "avatar": "🌸", "text": "推しの配信者のコメント欄に毎回書き込んでいるのですが、最近「常連さん」として認識されるようになりました。嬉しい反面、「ちょっとやりすぎかな」という気もしています。推しとの距離感って、どうやって保てばいいですか？", "who": "🌸 紫式部（源氏物語の読者たちへ）", "trivia": "源氏物語は宮中で貸し回され、熱狂的なファンが続きを催促したと言われています。「次の帖はいつできるの」と問い合わせが殺到した様子が当時の日記に残っています。推しへの熱狂は平安時代から変わらないようです。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🗺️", "text": "海外に出て世界を見てきたのですが、帰国したら「外国かぶれ」と言われて居場所がありません。海外で得た知識や技術を活かしたいのに、「そんなのこの国では通用しない」と言われます。帰国子女あるある、どうすれば受け入れてもらえますか？", "who": "🗺️ 岩倉使節団のメンバー（伊藤博文など）", "trivia": "明治維新後の岩倉使節団（1871〜1873年）は欧米を視察し近代化の知識を持ち帰りましたが、帰国後に「征韓論」派との政争に巻き込まれます。西洋の知識を日本に適用する難しさは明治の指導者たちが直面した最大の課題でした。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "💊", "text": "病気で長期療養中なのですが、動けない間に頭の中でずっと考えていたことを書き留めています。体が不自由でも、頭の中では何でもできる。この時間が意外と充実していて、健康だった頃より深く物事を考えられている気がします。", "who": "📚 正岡子規", "trivia": "正岡子規は結核で30代の大半を病床で過ごしながら、俳句・短歌の革新運動を行い「写生」という概念を確立しました。「病牀六尺」という随筆は死の直前まで書き続けた記録で、35歳で死去するまで創作をやめませんでした。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "⚙️", "text": "海外の最新技術を取り入れようとしているのですが、社内の古参メンバーから「今までのやり方を変えるな」という強い抵抗を受けています。新しい技術の導入って、どうやって社内を説得すればいいですか？", "who": "⚙️ 大隈重信（早稲田大学創設・外国技術導入）", "trivia": "大隈重信は明治政府の要職を務めながら外国技術の積極的な導入を推進しました。しかし守旧派との対立で政府を追われ、その後早稲田大学を創設します。「追放→独自路線」という逆転の発想が日本の近代化に貢献しました。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "🌺", "text": "好きな人のために全てを犠牲にしてきました。その人のそばにいるためなら地位も名誉も捨てられる、と本気で思っています。でも最近、相手が私のことをどう思っているのか、本当にわからなくなってきました。一方的な献身って、いつか報われますか？", "who": "🌺 淀殿（茶々）", "trivia": "茶々は豊臣秀吉の側室として秀頼を産みましたが、秀吉亡き後の豊臣家の存続のために徳川家康と戦い続けました。大坂の陣（1615年）で秀頼と共に自害します。愛した人の遺志を守るために全てを賭けた女性として歴史に刻まれています。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🎓", "text": "今の時代に合わない古い制度を全部変えようとしているのですが、変えれば変えるほど既存の権力者からの反発が強くなります。「急ぎすぎだ」「変えすぎだ」と言われますが、変えなければ間に合わないと思っています。スピードと慎重さ、どちらを優先すべきですか？", "who": "🎓 明治天皇（明治維新の推進）", "trivia": "明治維新では廃藩置県・徴兵令・地租改正など、わずか数年で江戸時代の制度を根本から変えました。あまりの急激な変化に各地で士族反乱（西南戦争など）が起きます。「急速な改革とその反動」は歴史が繰り返すパターンです。", "source": "japan", "r18": false}, {"cat": "adult", "avatar": "🌊", "text": "妻に内緒で複数の女性と関係を持っています。それが当然の時代だったとはいえ、妻の目が最近怖くなってきました。嫉妬しているのか、諦めているのか、全く読めなくて。こういう場合、正直に話すべきですか？", "who": "🌺 光源氏（源氏物語・現代版）", "trivia": "源氏物語では光源氏が正妻の葵の上、愛人の六条御息所、育てた紫の上など多くの女性と関係を持ちます。「複数の女性関係」が当然だった平安貴族社会でも、女性たちの嫉妬と苦しみは変わらなかったと源氏物語は描いています。", "source": "japan", "r18": true}, {"cat": "life", "avatar": "🌙", "text": "この世は全て無常で、何も永続しないと感じています。積み上げてきたものが崩れること、大切な人が去ること、全部「そういうものだ」と受け入れようとしているのですが、それでも喪失感はなくなりません。無常観を持ちながら生きるって、どういう感覚ですか？", "who": "🌙 鴨長明（方丈記・「ゆく河の流れは…」）", "trivia": "「ゆく河の流れは絶えずして、しかも元の水にあらず」——鎌倉時代初期に書かれた方丈記の冒頭は、無常観の最も美しい表現とされます。長明は地震・火事・飢饉・遷都という5つの災害を目撃した後にこの作品を書きました。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🗡️", "text": "スパイとして活動しているのですが、雇用主から「もっと大胆な情報収集をしろ」と言われています。でもリスクが高すぎる気がして、慎重に動いています。仕事のリスクと成果のバランス、どうやって判断すればいいですか？", "who": "🗡️ 服部半蔵（伊賀忍者・徳川家康の配下）", "trivia": "服部半蔵は徳川家康の家臣として伊賀忍者を率いた人物です。本能寺の変の後、家康が伊賀越えで危機を脱した際に護衛した功績で有名です。忍者の実態は映画のようなものとは異なり、主に情報収集・諜報活動が主な仕事だったとされています。", "source": "japan", "r18": false}, {"cat": "sns", "avatar": "📸", "text": "旅先の景色や出会った人々を細かく記録し続けています。「なぜそんなに記録するの」と言われますが、後から振り返ったとき、この記録が何かの役に立つと信じています。記録魔って、変ですか？", "who": "📸 松尾芭蕉（奥の細道）", "trivia": "松尾芭蕉は1689年、150日で約2400kmを旅した「奥の細道」を記録しました。「古池や蛙飛びこむ水の音」などの俳句と旅日記が一体となった作品は、紀行文学の最高峰とされます。徒歩旅行vlogの元祖とも言えます。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🏛️", "text": "国のシステムを根本から変えるための法律を立案しているのですが、既得権益を持つ上層部から「前例がない」「急ぎすぎ」「なぜ変える必要がある」と全部潰されます。正しいとわかっていることを実現するのに、何年かかりますか？", "who": "🏛️ 伊藤博文（明治憲法制定）", "trivia": "伊藤博文はヨーロッパの憲法を研究し日本初の近代憲法（大日本帝国憲法、1889年）を制定しました。この過程で薩摩・長州の藩閥政治との戦いが続きました。初代内閣総理大臣として日本の近代化を推進しましたが、1909年に暗殺されます。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "🎭", "text": "能や芸事をやっているのですが、師匠から「お前には才能がない」と言われてもう10年が経ちます。それでも続けているのは、この芸が好きだからです。才能なしと言われても続けることに、意味はありますか？", "who": "🎭 世阿弥（能楽師として）", "trivia": "世阿弥の「風姿花伝」には「上手いと思ったとき、すでに下り坂」「初心忘るべからず」という言葉があります。才能より鍛錬と意識の問題として芸を捉えた世阿弥の哲学は、600年後の現代でも稽古の場で語り継がれています。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🌏", "text": "海外でビジネスを展開しようとしているのですが、現地の文化・言語・商習慣が全く違いすぎて毎日壁にぶつかっています。「海外は無理だ、国内で十分」という同僚の声が最近少し正しく思えてきました。でも諦めたくないんです。", "who": "🌏 岩崎弥太郎（三菱創業者）", "trivia": "岩崎弥太郎は土佐藩の下級武士出身から三菱財閥を創業しました。海外汽船会社との競争に勝ち抜き、近代日本の海運・商業を確立します。「負けて学ぶ、負けて強くなる」という姿勢で事業を拡大した人物として知られています。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "✍️", "text": "小説を書いているのですが、書けば書くほど「人間の暗い部分」を描くことになってしまいます。明るい話を書こうとしても、自然と闇の方向に行ってしまう。これって性格が暗いということですか？それとも、それが私の才能ですか？", "who": "✍️ 夏目漱石", "trivia": "夏目漱石は「こころ」「吾輩は猫である」などで知られますが、生涯を通じて神経衰弱に苦しみました。「自分の小説は自分の病気の記録だ」とも語っています。人間の孤独・エゴ・近代化の矛盾を描き続けた作家は、その闇から不朽の作品を生み出しました。", "source": "japan", "r18": false}, {"cat": "sns", "avatar": "🖊️", "text": "文章でひたすら社会批判をしているのですが、当局から「あの記事は問題だ」と圧力をかけられました。書くことをやめろ、と言われましたが、やめる気はありません。表現の自由って、本当に守られているんですか？", "who": "🖊️ 幸徳秋水", "trivia": "社会主義者・幸徳秋水は政府批判の言論活動を続けましたが、1910年の大逆事件（天皇暗殺計画の疑い）で逮捕・処刑されました。その真偽は今も論争があります。明治時代の言論弾圧を象徴する事件として歴史に刻まれています。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🔬", "text": "日本で認められなかった研究が、海外では高く評価されました。「なぜ国内でわかってくれないのか」という悔しさと、「海外で評価された」という誇りが混在しています。自国で評価されないまま海外で認められた人って、幸せですか？", "who": "🔬 北里柴三郎", "trivia": "北里柴三郎は破傷風菌の純粋培養に成功しベーリングとともに血清療法を確立しましたが、帰国後は東京大学医学部から排除されました。ドイツのコッホ研究所で世界的な業績を上げた後、福沢諭吉の支援で北里研究所を設立します。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "🌸", "text": "結婚を3回しているのですが、毎回政治的な理由での離縁や死別でした。本当に自分が好きで一緒にいた時間が、どれくらいあったのか考えると切なくなります。自分の意志とは関係なく流された人生って、どうやって折り合いをつければいいですか？", "who": "🌸 細川ガラシャ（玉）", "trivia": "細川ガラシャは明智光秀の娘として生まれ、本能寺の変後に夫・細川忠興の手で幽閉されました。キリシタンとして洗礼を受け、関ヶ原の戦いの際に人質になることを拒んで自害しました。「散りぬべき時知りてこそ世の中の花も花なれ人も人なれ」という辞世の句が有名です。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🎌", "text": "会社を変えようとして改革案を提出したのですが、古参メンバーに「出る杭は打たれる」「波風立てるな」と言われて全部握りつぶされました。変えたいという気持ちと、組織の中で生き残りたいという現実の間で揺れています。", "who": "🎌 福沢諭吉", "trivia": "福沢諭吉は「学問のすゝめ」で「天は人の上に人を造らず」と説き、封建的身分制度を批判しました。しかし同時に「独立自尊」を掲げ、政府に頼らない市民の自立を説きました。慶應義塾を創設し、近代日本の教育・思想に多大な影響を与えています。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "🌊", "text": "ずっと剣を磨いてきたのに、剣が必要とされない時代になってしまいました。自分のスキルが時代遅れになっていく感覚、何とも言えない喪失感があります。時代の変化についていけない自分を受け入れるには、どうすればいいですか？", "who": "🌊 西郷隆盛（明治維新後の士族問題）", "trivia": "西郷隆盛は明治維新の立役者でしたが、近代化政策に反対し西南戦争を起こし敗死します。「武士としての誇り」と「新しい時代」の間で引き裂かれた人物として、多くの士族の気持ちを象徴しています。", "source": "japan", "r18": false}, {"cat": "sns", "avatar": "🌟", "text": "若い頃に書いたものが今も読まれていて、その頃の自分と比べられることが増えてきました。「昔の作品の方がよかった」「今はもう輝きがない」と言われると、正直傷つきます。成長しているつもりなのに、なぜ「昔の方がよかった」になるんですか？", "who": "🌟 松尾芭蕉（俳諧の変遷）", "trivia": "芭蕉は「古池や」の頃の俳風から晩年の「軽み」の境地まで、スタイルを大きく変え続けました。弟子たちからは「以前の方がわかりやすかった」という声もあったとされます。真の成長は常に「変化への抵抗」を伴います。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "⚗️", "text": "海外で学んできた最新の医療技術を日本に持ち込もうとしているのですが、保守的な同業者たちからの猛烈な反発があります。「西洋医学は信用できない」「昔からの方法で十分だ」と言われます。新しい知識を広めるのに一番大事なことは何ですか？", "who": "⚗️ 緒方洪庵", "trivia": "緒方洪庵は大阪に適塾を開き西洋医学を日本に広めました。その弟子には福沢諭吉・大村益次郎など明治維新の人材が名を連ねます。コレラの治療にも取り組み「医は仁術」の精神で医療の近代化に貢献しました。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "🎵", "text": "芸者として働いていますが、本気で好きになった人が私を「仕事の相手」としか見ていないことに気づきました。プロとしての立場と個人の感情の間で毎日引き裂かれています。仕事で人を好きになった経験のある方、どうやって整理しましたか？", "who": "🎵 芸者の世界（一般的な花柳界）", "trivia": "江戸・明治の花柳界では芸者と旦那（パトロン）の関係が複雑に絡み合い、本気の恋愛と職業的関係の境界は常に曖昧でした。樋口一葉の「たけくらべ」はそういった世界で育つ少女を描き、明治文学の傑作とされています。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "📚", "text": "編集者として著者の原稿と毎日格闘しています。天才と呼ばれる作家ほど締め切りを守らないし、要望も無茶苦茶です。それでも素晴らしい作品が生まれた時の喜びは何物にも代えがたいです。天才の世話係って、報われますか？", "who": "📚 夏目漱石の担当編集者たち（朝日新聞）", "trivia": "夏目漱石は朝日新聞の専属作家として多くの作品を連載しましたが、神経衰弱による休載や原稿の遅延が多く、編集部を悩ませたとされます。それでも「三四郎」「それから」「門」などの名作が生まれました。天才と締め切りの戦いは明治時代から変わりません。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "🏮", "text": "故郷を離れて都会で働いているのですが、田舎に帰るたびに「なんで都会にいるの」「帰ってこい」と言われます。でも都会でしかできないことがあって、簡単には帰れません。故郷への罪悪感と自分の夢の間で、ずっと揺れています。", "who": "🏮 石川啄木", "trivia": "石川啄木は故郷・岩手への望郷の念を多く詠みました。「ふるさとの山に向かひて言ふことなし ふるさとの山はありがたきかな」という歌は今も教科書に載っています。生涯貧困と病気に苦しみながら26歳で死去した天才歌人です。", "source": "japan", "r18": false}, {"cat": "adult", "avatar": "🎋", "text": "職場の懇親会で飲みすぎて、上司の奥さんに告白してしまいました。次の日のことは全然覚えていないのですが、同僚から「大変なことになっていた」と言われました。上司の目が怖いのですが、謝りに行くべきですか？それともしらばっくれるべきですか？", "who": "🎋 光源氏（源氏物語・義母への恋）", "trivia": "源氏物語で光源氏が父・桐壺帝の后・藤壺に密かに近づいたのも、宮中の宴の席での出来事がきっかけとされています。「お酒の席での一線越え」は平安時代から変わらない人間の弱さです。源氏は謝らずに密通を続けました（真似しないでください）。", "source": "japan", "r18": true}, {"cat": "adult", "avatar": "🏯", "text": "年下の側近に本気で惹かれています。立場的にはこちらが上なのですが、最近その側近の方が仕事ができるようになってきて、逆に惹かれる気持ちが強くなっています。こういう感情って、相手に伝えていいですか？", "who": "🏯 豊臣秀吉と石田三成（別解釈）", "trivia": "石田三成は秀吉に茶を出したことで取り立てられたという有名な逸話があります。三成の忠義と秀吉への献身は死後も変わらず、秀吉亡き後も豊臣家のために戦い続けました。上下関係を超えた「忠愛」の関係として語られることがあります。", "source": "japan", "r18": true}, {"cat": "work", "avatar": "🌺", "text": "父が経営していた会社を継いだのですが、「先代の方がよかった」と古参社員に言われ続けています。父と同じやり方をすれば「また同じことの繰り返し」と言われ、変えれば「勝手なことをするな」と言われます。2代目の悩み、解決策はありますか？", "who": "🌺 豊臣秀頼", "trivia": "豊臣秀頼は父・秀吉の死後、幼くして豊臣家を継ぎました。母・淀殿と取り巻きに囲まれ、自分で判断できる環境が整わないまま大坂の陣を迎えます。「先代の威光に頼りすぎた2代目」の悲劇として歴史に記録されています。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "🎌", "text": "何か大きなことを成し遂げたいのですが、何から手をつければいいかわかりません。周りは「まず勉強しろ」「まず経験を積め」と言いますが、それをやっているうちに時間が経ってしまいそうで焦ります。「志を持って生きる」って、具体的にどうすればいいですか？", "who": "🎌 吉田松陰", "trivia": "吉田松陰は松下村塾で伊藤博文・山縣有朋・高杉晋作など明治維新を担う人材を育てましたが、本人は29歳で処刑されました。「夢なき者に理想なし、理想なき者に計画なし、計画なき者に実行なし」という言葉が有名です。短い生涯で時代を動かした人物です。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🗡️", "text": "部下を厳しく鍛えているのですが、「厳しすぎる」「ついていけない」と言われています。でも甘やかしたら本番で使えない人間になると思っているので、妥協できません。厳しい指導と人材育成って、どちらが正しいですか？", "who": "🗡️ 山岡鉄舟", "trivia": "山岡鉄舟は剣・禅・書の三道を極めた明治の剣客で、江戸無血開城の交渉者の一人です。鉄舟の道場は厳しいことで有名でしたが、多くの優秀な剣士を育てました。「一刀流の稽古で打ちのめされた」という弟子の証言が多数残っています。", "source": "japan", "r18": false}, {"cat": "sns", "avatar": "🌸", "text": "自分のことを日記に細かく書いているのですが、それが後に歴史の資料になるかもしれないと思ったら、少し盛って書きたくなってきました。後世の人が読むことを意識して書くべきですか？それとも正直に書くべきですか？", "who": "🌸 菅原道真", "trivia": "菅原道真は漢詩文の天才として知られ、多くの記録・詩文を残しました。しかし藤原氏の策略で大宰府に左遷され、失意の中で死去します。死後に天変地異が続き「道真の怨霊」として恐れられ、天満宮（学問の神様）として祀られます。", "source": "japan", "r18": false}, {"cat": "work", "avatar": "🎓", "text": "外国語を独学で習得して、通訳・翻訳の仕事をしています。「どこで学んだの」と聞かれますが、独学なので正式な資格もないし学歴もありません。独学の人間って、やっぱり正規の教育を受けた人より下に見られますか？", "who": "🎓 福沢諭吉（蘭学・英語独学）", "trivia": "福沢諭吉は長崎でオランダ語を学んだ後、横浜で英語が必要と悟り独学で英語を習得しました。正式な英語教育は受けていませんが、アメリカ使節団に同行し西洋文明を直接学びます。独学と自己教育の重要性を「学問のすゝめ」でも説いています。", "source": "japan", "r18": false}, {"cat": "love", "avatar": "💐", "text": "離れ離れになった相手に毎年花を贈り続けているのですが、会えないままもう5年が経ちます。相手も気持ちは同じだと思っているのですが、状況が許してくれません。5年間想い続けた気持ち、それは本物ですか？それとも思い込みですか？", "who": "💐 菅原道真（梅と都への思い）", "trivia": "道真が大宰府に左遷される際に詠んだ「東風吹かば匂ひをこせよ梅の花 主なしとて春を忘るな」という歌は、都の梅の木への別れを詠んだものです。翌春、その梅が大宰府まで飛んで来たという「飛梅伝説」が生まれました。", "source": "japan", "r18": false}, {"cat": "adult", "avatar": "🌺", "text": "好きな人との間に身分の差があって、公には付き合えない状況です。こっそり会い続けて3年になりますが、いつか正式に認めてもらえると信じています。禁断の関係って、いつか報われますか？", "who": "🌺 淀殿と豊臣秀吉（側室関係）", "trivia": "茶々（淀殿）はもともと秀吉の敵・浅井長政の娘でしたが、秀吉の側室となりました。敵の娘を側室にするという当時としても複雑な関係は、権力と感情が絡み合う戦国時代の縮図です。秀頼を産んだことで豊臣家の中心となります。", "source": "japan", "r18": true}, {"cat": "work", "avatar": "✍️", "text": "出版社から「もっと大衆に受けるものを書け」と言われています。でも私が書きたいのはもっと深くて難しいものです。売れる本を書くか、書きたい本を書くか。どちらを選んでも後悔しそうで決められません。", "who": "✍️ 森鷗外", "trivia": "森鷗外は陸軍軍医総監という要職を務めながら小説・翻訳・評論を書き続けました。「舞姫」「阿部一族」などは芸術性と大衆性の両立を試みた作品です。官僚としての顔と芸術家としての顔を両立させながら生きることの難しさを体現した人物です。", "source": "japan", "r18": false}, {"cat": "life", "avatar": "🌊", "text": "若い頃は「世界を変えてやる」という気概があったのですが、中年になってその情熱が薄れてきました。現実に打ちのめされながらも、あの頃の自分の熱さが懐かしいです。歳を取っても情熱を保ち続けた人っていますか？", "who": "🌊 勝海舟", "trivia": "勝海舟は江戸無血開城（1868年）という歴史的偉業を成し遂げた後も、明治政府に批判的な立場を取り続け、晩年まで「旧幕府の良いところ」を訴え続けました。78歳で死去するまで時代への発言を続けた人物です。", "source": "japan", "r18": false}];

var cat = 'all', r18 = false, current = null, hist = [], used = {};
var srcs = {japan:true, world:true, myth:true, literature:true};

function pool() {
  var out = [];
  for (var i = 0; i < DATA.length; i++) {
    var d = DATA[i];
    if (d.r18 && !r18) continue;
    if (cat !== 'all' && d.cat !== cat) continue;
    if (!srcs[d.source || 'world']) continue;
    out.push(i);
  }
  return out;
}

function updateCount() {
  document.getElementById('pnum').textContent = pool().length;
}

function generate() {
  var idxList = pool();
  var cbody = document.getElementById('cbody');
  if (idxList.length === 0) {
    cbody.innerHTML = '';
    var msg = document.createElement('div');
    msg.className = 'empty';
    msg.textContent = '条件に合うネタがありません。フィルターを変えてみてください。';
    cbody.appendChild(msg);
    return;
  }
  var unused = idxList.filter(function(i){ return !used[i]; });
  if (unused.length === 0) { used = {}; unused = idxList; }

  var card = document.getElementById('card');
  card.classList.add('fade');
  document.getElementById('bnext').disabled = true;

  setTimeout(function() {
    var idx = unused[Math.floor(Math.random() * unused.length)];
    used[idx] = true;
    var item = DATA[idx];
    current = item;

    var st = STYLES[item.cat] || STYLES.work;
    document.getElementById('cbar').style.background = st.color;

    cbody.innerHTML = '';

    var avRow = document.createElement('div');
    avRow.className = 'av-row';
    var av = document.createElement('div');
    av.className = 'av';
    av.textContent = item.avatar || '👻';
    var meta = document.createElement('div');
    var name = document.createElement('div');
    name.style.cssText = 'font-size:13px;font-weight:500;';
    name.textContent = '匿名さん';
    var badge = document.createElement('div');
    badge.className = 'badge';
    badge.style.background = st.light;
    badge.style.color = st.color;
    badge.style.border = '1px solid ' + st.border;
    badge.textContent = st.label;
    meta.appendChild(name);
    meta.appendChild(badge);
    avRow.appendChild(av);
    avRow.appendChild(meta);
    cbody.appendChild(avRow);

    var ctext = document.createElement('div');
    ctext.className = 'ctext';
    ctext.textContent = item.text;
    cbody.appendChild(ctext);

    var rbtn = document.createElement('button');
    rbtn.className = 'rbtn';
    rbtn.textContent = '👁 この人、だれ？ ― 正体を確認する';
    cbody.appendChild(rbtn);

    var rpanel = document.createElement('div');
    rpanel.className = 'rpanel';
    var rwho = document.createElement('div');
    rwho.className = 'rwho';
    rwho.textContent = item.who;
    var rtrivia = document.createElement('div');
    rtrivia.className = 'rtrivia';
    var strong = document.createElement('strong');
    strong.textContent = '解説：';
    rtrivia.appendChild(strong);
    rtrivia.appendChild(document.createTextNode(item.trivia));
    rpanel.appendChild(rwho);
    rpanel.appendChild(rtrivia);
    cbody.appendChild(rpanel);

    rbtn.addEventListener('click', function() {
      var open = rpanel.classList.toggle('open');
      rbtn.textContent = open ? '🙈 正体を隠す' : '👁 この人、だれ？ ― 正体を確認する';
    });

    card.classList.remove('fade');
    document.getElementById('bnext').disabled = false;

    hist.unshift(item.text);
    if (hist.length > 5) hist.pop();
    renderHist();
    updateShare();
  }, 220);
}

function renderHist() {
  var sec = document.getElementById('hsec');
  var list = document.getElementById('hlist');
  sec.style.display = hist.length ? 'block' : 'none';
  list.innerHTML = '';
  for (var i = 0; i < hist.length; i++) {
    var d = document.createElement('div');
    d.className = 'hitem';
    d.textContent = hist[i].substring(0, 65) + (hist[i].length > 65 ? '…' : '');
    list.appendChild(d);
  }
}

function updateShare() {
  if (!current) return;
  var url = encodeURIComponent(location.href);
  var tw = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent('【ゴーストレター】\n\n' + current.text.substring(0,50) + '...\n\n誰からの手紙かわかる？👇\n#ゴーストレター') + '&url=' + url;
  document.getElementById('shrx').href = tw;
  document.getElementById('shrl').href = 'https://social-plugins.line.me/lineit/share?url=' + url;
}

document.getElementById('bnext').addEventListener('click', generate);

document.getElementById('bcopy').addEventListener('click', function() {
  if (!current) return;
  var text = '【ゴーストレター】\n\n' + current.text + '\n\n▼ この相談主は……\n' + current.who + '\n' + current.trivia;
  navigator.clipboard.writeText(text).then(function() {
    var t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2000);
  });
});

document.getElementById('cats').addEventListener('click', function(e) {
  var b = e.target.closest('.cbtn');
  if (!b) return;
  cat = b.getAttribute('data-cat');
  document.querySelectorAll('.cbtn').forEach(function(x){ x.classList.remove('on'); });
  b.classList.add('on');
  updateCount();
});

document.getElementById('r18').addEventListener('change', function() {
  r18 = this.checked;
  document.querySelectorAll('.r18only').forEach(function(el){
    el.style.display = r18 ? 'inline-flex' : 'none';
  });
  if (!r18 && cat === 'adult') {
    cat = 'all';
    document.querySelectorAll('.cbtn').forEach(function(x){ x.classList.remove('on'); });
    document.querySelector('[data-cat="all"]').classList.add('on');
  }
  updateCount();
});

document.getElementById('srcs').addEventListener('click', function(e) {
  var b = e.target.closest('.sbtn');
  if (!b) return;
  var src = b.getAttribute('data-src');
  var isOn = b.classList.contains('on');
  if (isOn) {
    var onCount = Object.keys(srcs).filter(function(k){ return srcs[k]; }).length;
    if (onCount <= 1) return;
    srcs[src] = false;
    b.classList.remove('on');
    b.querySelector('.schk').textContent = '';
  } else {
    srcs[src] = true;
    b.classList.add('on');
    b.querySelector('.schk').textContent = '✓';
  }
  updateCount();
});

document.getElementById('freset').addEventListener('click', function() {
  srcs = {japan:true, world:true, myth:true, literature:true};
  document.querySelectorAll('.sbtn').forEach(function(b){
    b.classList.add('on');
    b.querySelector('.schk').textContent = '✓';
  });
  updateCount();
});

updateCount();
generate();
</script>
</body>
</html>
